<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Best Cooks Club — Admin · Chapters</title>
  <!-- Admin chapter editor on the shared master/detail editor shell.
       editor-shell.css = the namespaced framework skin; library-shell.js
       = behaviour (cross-page ⋮ nav, identity badge, X-Self-User-Id fetch
       patch, helpers) + the initEditorNav controller (dock/overlay/back).
       See memory/project_admin_editor_nav.md. -->
  <link rel="stylesheet" href="/forms/editor-shell.css?v=20260531b">
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <button class="ed-back" id="edBack" aria-label="Toggle list"></button>
      <div class="ed-brand">Best Cooks Club</div>
      <!-- LibraryShell.initNav appends: .nav-spacer, .identity-badge, .nav-toggle(⋮) -->
    </div>
  </header>
  <div class="ed-scrim" id="edScrim"></div>

  <div class="ed-app">
    <aside class="ed-sidebar">
      <div class="ed-sidebar-head">
        <h2>Chapters <span class="ed-count" id="count"></span></h2>
        <div class="ed-head-actions">
          <button class="ed-icon-btn" id="searchToggle" title="Search &amp; sort" aria-label="Search and sort">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          </button>
          <button class="ed-icon-btn" id="addToggle" title="New chapter" aria-label="New chapter">
            <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
          </button>
        </div>
      </div>

      <div class="ed-attn" id="attn"><div class="ed-attn-title" id="attnTitle"></div><div class="ed-attn-copy" id="attnCopy"></div></div>

      <div class="ed-controls" id="controls" hidden>
        <button type="button" class="ed-ghost-btn" id="refreshAllBtn">Refresh all fits</button>
        <input type="search" id="search" placeholder="Search chapters…">
        <select id="sort" aria-label="Sort chapters">
          <option value="attention">Sort: needs attention</option>
          <option value="name">Sort: name (A–Z)</option>
          <option value="recipes">Sort: recipes (most)</option>
          <option value="updated">Sort: last fit</option>
        </select>
      </div>

      <div class="ed-legend">
        <span><i class="d ok"></i>healthy fit</span>
        <span><i class="d warn"></i>needs attention</span>
        <span><i class="d none"></i>no fit</span>
      </div>

      <ul class="ed-list" id="list"><li class="ed-empty">Loading…</li></ul>
    </aside>

    <main class="ed-content"><div class="ed-page" id="page"></div></main>
  </div>

  <script src="/forms/library-shell.js?v=20260531a"></script>
  <script>
    const $ = (s) => document.querySelector(s);

    LibraryShell.initNav({ currentPage: 'chapters' });
    const nav = LibraryShell.initEditorNav({
      backButton: '#edBack', scrim: '#edScrim',
      listLabel: 'Chapters', listMode: 'docked', shellWidth: 1200,
    });
    const { escapeHtml, fmtDate, flash } = LibraryShell;

    let chapters = {};
    let selectedName = null;
    let term = '';
    let sortKey = 'attention';

    /* ----------------------------- derivations ----------------------------- */
    const fitOf = (c) => c.last_ou_fit || {};
    const isGraded = (c) => !!fitOf(c).used;
    function num(v, d = 4){ if (v == null) return '—'; const n = Number(v); return isFinite(n) ? n.toFixed(d) : '—'; }
    function cap(s){ return s ? s.charAt(0).toUpperCase() + s.slice(1) : s; }
    function quality(c){
      if (!isGraded(c)) return c.fit_status === 'below_min_n' ? 'Corpus too small' : 'Not yet fit';
      const r2 = Number(fitOf(c).r2_chosen);
      if (r2 >= 0.75) return 'Excellent fit';
      if (r2 >= 0.60) return 'Healthy fit';
      if (r2 >= 0.45) return 'Moderate fit';
      return 'Weak fit';
    }
    function needsAttention(c){ return !(isGraded(c) && Number(fitOf(c).r2_chosen) >= 0.60); }
    function flag(c){
      if (isGraded(c)) return Number(fitOf(c).r2_chosen) >= 0.60 ? 'ok' : 'warn';
      if (c.fit_status === 'below_min_n') return 'none';
      return 'warn';
    }
    function listMeta(c){
      const f = fitOf(c);
      if (isGraded(c)) return `${f.n} records · ${f.model} · R² ${num(f.r2_chosen, 2)}`;
      if (c.fit_status === 'below_min_n') return `${f.n ?? 0} of 25 records`;
      return `no cohort yet`;
    }

    /* ----------------------------- list ----------------------------- */
    function renderList(){
      const t = term.toLowerCase();
      let rows = Object.values(chapters).filter(c => !t || c.name.toLowerCase().includes(t));
      const sorters = {
        attention: (a, b) => (needsAttention(b) - needsAttention(a)) || a.name.localeCompare(b.name),
        name:    (a, b) => a.name.localeCompare(b.name),
        recipes: (a, b) => (b.current_recipe_count || 0) - (a.current_recipe_count || 0) || a.name.localeCompare(b.name),
        updated: (a, b) => String(b.fit_updated_at || '').localeCompare(String(a.fit_updated_at || '')) || a.name.localeCompare(b.name),
      };
      rows.sort(sorters[sortKey] || sorters.attention);
      $('#count').textContent = `(${rows.length})`;

      const attn = Object.values(chapters).filter(needsAttention).length;
      const panel = $('#attn'), title = $('#attnTitle'), copy = $('#attnCopy');
      if (attn){ panel.classList.remove('none'); title.textContent = `${attn} need attention`; copy.textContent = 'Weak fit, no fit, or corpus below the 25-recipe minimum.'; }
      else { panel.classList.add('none'); title.textContent = 'All chapters healthy'; copy.textContent = 'Every chapter has a usable fit.'; }

      const ul = $('#list'); ul.innerHTML = '';
      if (!rows.length){ ul.innerHTML = '<li class="ed-empty">No matches</li>'; return; }
      for (const c of rows){
        const li = document.createElement('li');
        li.className = 'ed-item' + (c.name === selectedName ? ' selected' : '');
        li.innerHTML =
          `<div class="ed-item-top"><span class="ed-item-name">${escapeHtml(c.name)}</span><span class="ed-item-flag ${flag(c)}"></span></div>` +
          `<div class="ed-item-meta">${escapeHtml(listMeta(c))}</div>`;
        li.addEventListener('click', () => { selectedName = c.name; renderList(); renderDetail(); nav.afterSelect(); });
        ul.appendChild(li);
      }
    }

    /* ----------------------------- detail ----------------------------- */
    function fmtCoeffs(fit){
      if (!fit || !fit.coefficients) return '';
      const c = fit.coefficients.map(x => Number(x));
      let line, pa80;
      if (fit.model === 'linear'){ line = `predicted PA  =  ${num(c[0],4)}·DA  +  ${num(c[1],2)}`; pa80 = c[0]*80 + c[1]; }
      else if (fit.model === 'quadratic'){ line = `predicted PA  =  ${num(c[0],4)}·DA²  +  ${num(c[1],4)}·DA  +  ${num(c[2],2)}`; pa80 = c[0]*6400 + c[1]*80 + c[2]; }
      else if (fit.model === 'power'){ line = `predicted PA  =  ${num(c[0],4)}·DA ^ ${num(c[1],4)}`; pa80 = c[0]*Math.pow(80, c[1]); }
      else return c.map(x => num(x, 4)).join(', ');
      return `${line}<span class="ex">at DA 80  →  PA ≈ ${isFinite(pa80) ? pa80.toFixed(1) : '—'}</span>`;
    }

    // The fitted regression VARIABLES (model parameters), labeled by term so
    // they read as data, not just an equation string.
    function coeffVars(f){
      const c = (f.coefficients || []).map(x => Number(x));
      if (f.model === 'linear')    return `slope·DA ${num(c[0], 4)} · intercept ${num(c[1], 2)}`;
      if (f.model === 'quadratic') return `DA² ${num(c[0], 4)} · DA ${num(c[1], 4)} · intercept ${num(c[2], 2)}`;
      if (f.model === 'power')     return `scale ${num(c[0], 4)} · exponent ${num(c[1], 4)}`;
      return c.map(x => num(x, 4)).join(', ');
    }

    function modelFitBlock(c){
      const f = fitOf(c);
      if (!isGraded(c)){
        const msg = c.fit_status === 'below_min_n'
          ? `This chapter’s fit cohort has <strong>${f.n ?? 0}</strong> source-site record${f.n === 1 ? '' : 's'} — the regression needs at least <strong>25</strong>. (These are the SERP DA/PA records from the chapter’s dishes, not saved recipes.) Each dish refresh re-derives the cohort.`
          : `No cohort yet — this chapter is fit on its dishes’ next refresh.`;
        return `<section class="ed-block"><h3 class="ed-block-label">Model fit</h3><p class="ed-empty-fit">${msg}</p></section>`;
      }
      const candStr = ['linear','quadratic','power'].map(m => {
        const v = num(f['r2_' + m], 3);
        return m === f.model ? `<strong>${m} ${v}</strong>` : `${m} ${v}`;
      }).join(' <span class="sub">·</span> ');
      const floorTxt = (f.exc_sigma_floor != null && Number(f.sigma_effective) > Number(f.sigma_observed)) ? ' (applied)' : '';
      return `
        <section class="ed-block">
          <h3 class="ed-block-label">Model fit</h3>
          <div class="ed-kv">
            <div class="k">Model type</div><div class="v">${cap(f.model)} regression</div>
            <div class="k">Regression</div><div class="v">page authority (PA) ~ domain authority (DA)</div>
            <div class="k">Fitted coefficients</div><div class="v">${coeffVars(f)}</div>
            <div class="k">Source-site records</div><div class="v">${f.n ?? '—'}</div>
            <div class="k">Coefficient of determination</div><div class="v">R² = ${num(f.r2_chosen, 2)} <span class="sub">· ${quality(c).replace(' fit','').toLowerCase()}</span></div>
            <div class="k">Residual scatter (σ)</div><div class="v">${num(f.sigma_observed, 2)}</div>
            <div class="k">Effective σ</div><div class="v">${num(f.sigma_effective, 2)} <span class="sub">· floor ${num(f.exc_sigma_floor, 1)}${floorTxt}</span></div>
            <div class="k">Candidate fits</div><div class="v">${candStr}</div>
            <div class="k">Grade scale</div><div class="v">base ${f.exc_base ?? '—'} <span class="sub">· σ×${f.exc_sigma_mult ?? '—'}</span></div>
          </div>
          <p class="ed-provenance">Computed automatically at the end of each dish run — last run ${fmtDate(c.fit_updated_at)}. Read-only here.</p>
        </section>
        <section class="ed-block">
          <h3 class="ed-block-label">Predicted authority model</h3>
          <pre class="ed-formula">${fmtCoeffs(f)}</pre>
        </section>`;
    }

    function renderDetail(){
      const panel = $('#page');
      if (selectedName === '__new__') return renderCreate();
      if (!selectedName || !chapters[selectedName]){
        panel.innerHTML = `<div class="ed-block" style="border-top:none;padding-top:8px"><p class="ed-empty-fit">Select a chapter from the list to review its authority-model fit and edit curator notes. Each chapter holds an aggregate OU regression used as a grading fallback when a dish cohort is too small (n &lt; 25) to fit on its own.</p></div>`;
        return;
      }
      const c = chapters[selectedName];
      const f = fitOf(c);
      const sub = isGraded(c)
        ? `R² ${num(f.r2_chosen, 2)} · ${f.n} source-site records · last fit ${fmtDate(c.fit_updated_at)}`
        : (c.fit_status === 'below_min_n'
            ? `${f.n ?? 0} of 25 source-site records — fit withheld`
            : `no cohort yet · awaiting a dish refresh`);

      panel.innerHTML = `
        <div class="ed-kicker">
          <button type="button" class="ed-purpose-toggle" id="purposeToggle">Admin · Edit Chapter <span id="purposeArrow">▾</span></button>
          <div class="ed-purpose-pop" id="purposePop" hidden>
            <strong>Purpose:</strong> review this chapter’s read-only authority fit, edit curator notes, and refresh the fit. Fits are recomputed by the dish pipeline at the end of each run.
          </div>
        </div>

        <h1 class="ed-title">${escapeHtml(c.name)}</h1>
        <div class="ed-status-strip">
          <span class="ed-pill ${needsAttention(c) ? 'warn' : 'ok'}"><i class="d"></i>${quality(c)}</span>
          <span class="ed-pill"><i class="d"></i>${isGraded(c) ? f.n + ' source-site records' : (c.fit_status === 'below_min_n' ? (f.n ?? 0) + ' of 25 records' : 'no cohort yet')}</span>
          <span class="ed-pill"><i class="d"></i>Last fit ${fmtDate(c.fit_updated_at)}</span>
        </div>
        <p class="ed-submeta">${sub}</p>

        ${modelFitBlock(c)}

        <section class="ed-block">
          <h3 class="ed-block-label">Top 10 recipes <span class="ed-count" id="top10count"></span></h3>
          <p class="ed-notes-help" style="margin:0 0 12px">The chapter’s 10 highest-OU recipes across its dishes — recomputed each dish refresh.</p>
          <ol class="ed-t10" id="top10list"><li class="ed-empty-fit">Loading…</li></ol>
        </section>

        <section class="ed-block">
          <details class="ed-accordion">
            <summary>Source sites <span class="ed-count" id="recCount">${(isGraded(c) || c.fit_status === 'below_min_n') ? '(' + (f.n ?? 0) + ')' : ''}</span></summary>
            <p class="ed-notes-help" style="margin:12px 0 12px">The sites whose (DA, PA) records this chapter’s fit was computed on — the cohort drawn from the chapter’s dishes.</p>
            <div class="ed-cohort" id="cohort" style="max-height:340px;overflow-y:auto"><p class="ed-empty-fit">Loading…</p></div>
          </details>
        </section>

        <section class="ed-block">
          <h3 class="ed-block-label">Curator notes</h3>
          <p class="ed-notes-help">Scope decisions, classification exceptions, known corpus issues, follow-up work.</p>
          <textarea id="notes" class="ed-notes" placeholder="Editorial context, known issues, scope decisions…">${escapeHtml(c.notes || '')}</textarea>
        </section>

        <div class="ed-actions">
          <button type="button" class="ed-btn primary" id="refreshBtn">Refresh fit</button>
          <button type="button" class="ed-btn" id="saveBtn">Save notes</button>
          <span class="ed-save-hint" id="hint"></span>
        </div>`;

      $('#purposeToggle').addEventListener('click', () => {
        const p = $('#purposePop'), a = $('#purposeArrow');
        p.hidden = !p.hidden; a.textContent = p.hidden ? '▾' : '▴';
      });
      $('#refreshBtn').addEventListener('click', () => doRefresh(c.name));
      $('#saveBtn').addEventListener('click', () => doSaveNotes(c.name));
      loadChapterTop10(c.name);     // top-10 recipes — primary visible section
      // Source-sites list is collapsed by default; lazy-load rows on first expand.
      const acc = panel.querySelector('.ed-accordion');
      if (acc) acc.addEventListener('toggle', () => {
        if (acc.open && !acc.dataset.loaded){ acc.dataset.loaded = '1'; loadChapterRecipes(c.name); }
      });
    }

    async function loadChapterTop10(name){
      const wrap = $('#top10list');
      if (!wrap) return;
      try {
        const r = await fetch(`/chapters/${encodeURIComponent(name)}/top-recipes`);
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        const payload = await r.json();
        const recs = payload.recipes || [];
        const cnt = $('#top10count'); if (cnt) cnt.textContent = recs.length ? `(${recs.length})` : '';
        if (!recs.length){ wrap.innerHTML = '<li class="ed-empty-fit">No scored recipes for this chapter yet — populated on the next dish refresh.</li>'; return; }
        wrap.innerHTML = recs.map((rec, i) => {
          const href = rec.bcc_url || rec.source_url || '#';
          const img = (rec.preview_image || rec.fallback_image || '').trim();
          const thumb = img
            ? `<span class="ed-t10-thumb"><img src="${escapeHtml(img)}" alt="" loading="lazy"></span>`
            : `<span class="ed-t10-thumb"></span>`;
          const host = rec.site_name || (rec.source_url || '').replace(/^https?:\/\//, '').split('/')[0];
          const sub = [host, rec.dish].filter(Boolean).map(escapeHtml).join(' · ');
          const ou = (typeof rec.ou === 'number') ? rec.ou.toFixed(1) : '—';
          const grade = rec.grade ? `<span class="ed-t10-grade">${escapeHtml(rec.grade)}</span>` : '';
          const dapa = `DA ${rec.da == null ? '—' : Math.round(rec.da)} · PA ${rec.pa == null ? '—' : Math.round(rec.pa)}`;
          return `<a class="ed-t10-row" href="${escapeHtml(href)}" target="_blank" rel="noopener" title="Open in BCC">
              <span class="ed-t10-rank">${i + 1}</span>
              ${thumb}
              <span class="ed-t10-main"><span class="ed-t10-name">${escapeHtml(rec.name)}</span><span class="ed-t10-sub">${sub}</span></span>
              <span class="ed-t10-metrics">
                <span class="ed-t10-ouline"><span class="ed-t10-ou">${ou}<small>OU</small></span>${grade}</span>
                <span class="ed-t10-dapa">${dapa}</span>
              </span>
            </a>`;
        }).join('');
      } catch (e) {
        wrap.innerHTML = `<li class="ed-empty-fit">Couldn’t load top recipes (${escapeHtml(String(e.message || e))}).</li>`;
      }
    }

    function renderCreate(){
      const panel = $('#page');
      panel.innerHTML = `
        <div class="ed-kicker"><button type="button" class="ed-purpose-toggle" disabled style="cursor:default">Admin · New Chapter</button></div>
        <h1 class="ed-title">Add a chapter</h1>
        <p class="ed-notes-help" style="margin:0 0 20px;font-size:.95em">Creates a chapter row. It starts unfit — it’ll be fit once recipes are classified into it and a dish run (or Refresh fit) computes its authority model.</p>
        <section class="ed-block" style="border-top:none;padding-top:0">
          <div class="ed-form-grid">
            <div class="ed-field full"><label for="newName">Chapter name</label><input id="newName" type="text" placeholder="e.g. Pickles &amp; Preserves" autocomplete="off"></div>
            <div class="ed-field full"><label for="newNotes">Curator notes (optional)</label><textarea id="newNotes" class="ed-notes" style="min-height:110px" placeholder="Why this chapter exists, scope, edge cases…"></textarea></div>
          </div>
        </section>
        <div class="ed-actions" style="position:static;background:none;padding:8px 0 0">
          <button type="button" class="ed-btn primary" id="createBtn">Create chapter</button>
          <button type="button" class="ed-btn" id="cancelBtn">Cancel</button>
          <span class="ed-save-hint" id="hint"></span>
        </div>`;
      $('#newName').focus();
      $('#cancelBtn').addEventListener('click', () => { selectedName = null; renderList(); renderDetail(); });
      $('#createBtn').addEventListener('click', doCreate);
    }

    async function doCreate(){
      const name = $('#newName').value.trim();
      const notes = $('#newNotes').value.trim();
      const hint = $('#hint'); const btn = $('#createBtn');
      if (!name){ hint.style.color = 'var(--ed-warn)'; hint.textContent = 'Chapter name is required'; $('#newName').focus(); return; }
      btn.disabled = true; btn.textContent = 'Creating…';
      try {
        const r = await fetch('/chapters', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, notes }) });
        const data = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(data.detail || `HTTP ${r.status}`);
        await loadChapters();
        selectedName = name;
        renderList(); renderDetail();
        flash('Chapter created');
      } catch (e) {
        btn.disabled = false; btn.textContent = 'Create chapter';
        hint.style.color = 'var(--ed-warn)'; hint.textContent = String(e.message || e);
      }
    }

    async function loadChapterRecipes(name){
      const wrap = $('#cohort');
      if (!wrap) return;
      try {
        const r = await fetch(`/chapters/${encodeURIComponent(name)}/recipes`);
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        const recs = await r.json();
        const cnt = $('#recCount'); if (cnt) cnt.textContent = `(${recs.length})`;
        if (!recs.length){ wrap.innerHTML = '<p class="ed-empty-fit">No source records.</p>'; return; }
        wrap.innerHTML = recs.map(rec => {
          const url = rec.url || '';
          const disp = url.replace(/^https?:\/\//, '');
          const da = rec.da == null ? '—' : Number(rec.da).toFixed(0);
          const pa = rec.pa == null ? '—' : Number(rec.pa).toFixed(0);
          return `<a class="ed-cohort-row" href="${escapeHtml(url)}" target="_blank" rel="noopener">
              <span class="ed-cohort-url">${escapeHtml(disp)}</span>
              <span class="ed-cohort-scores">DA ${da} · PA ${pa}</span></a>`;
        }).join('');
      } catch (e) {
        wrap.innerHTML = `<p class="ed-empty-fit">Couldn’t load records (${escapeHtml(String(e.message || e))}).</p>`;
      }
    }

    /* ----------------------------- data + actions ----------------------------- */
    async function loadChapters(){
      const r = await fetch('/chapters');
      if (!r.ok){ console.error('list chapters failed', r.status); return; }
      const list = await r.json();
      chapters = {};
      for (const c of list) chapters[c.name] = c;
      renderList();
      renderDetail();
    }

    async function doRefresh(name){
      const btn = $('#refreshBtn');
      if (btn){ btn.disabled = true; btn.textContent = 'Refreshing…'; }
      try {
        const r = await fetch(`/chapters/${encodeURIComponent(name)}/refresh`, { method: 'POST' });
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        chapters[name] = await r.json();
        renderList(); renderDetail();
        flash('Fit refreshed');
      } catch (e) {
        if (btn){ btn.disabled = false; btn.textContent = 'Refresh fit'; }
        flash(`Refresh failed: ${e.message || e}`, true);
      }
    }

    async function doSaveNotes(name){
      const notes = $('#notes').value;
      const btn = $('#saveBtn'); const hint = $('#hint');
      btn.disabled = true; btn.textContent = 'Saving…'; btn.classList.remove('done');
      try {
        const r = await fetch(`/chapters/${encodeURIComponent(name)}`, {
          method: 'PATCH', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ notes }),
        });
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        chapters[name] = await r.json();
        btn.textContent = 'Saved ✓'; btn.classList.add('done');
        if (hint) hint.textContent = 'Notes saved';
        setTimeout(() => { btn.textContent = 'Save notes'; btn.classList.remove('done'); btn.disabled = false; }, 1900);
      } catch (e) {
        btn.disabled = false; btn.textContent = 'Save notes';
        flash(`Save failed: ${e.message || e}`, true);
      }
    }

    /* ----------------------------- wiring ----------------------------- */
    $('#searchToggle').addEventListener('click', () => {
      const c = $('#controls');
      c.hidden = !c.hidden;
      $('#searchToggle').classList.toggle('active', !c.hidden);
      if (!c.hidden) $('#search').focus();
    });
    $('#addToggle').addEventListener('click', () => { selectedName = '__new__'; renderList(); renderDetail(); nav.afterSelect(); });
    $('#search').addEventListener('input', (e) => { term = e.target.value; renderList(); });
    $('#sort').addEventListener('change', (e) => { sortKey = e.target.value; renderList(); });
    $('#refreshAllBtn').addEventListener('click', async () => {
      const btn = $('#refreshAllBtn');
      btn.disabled = true; btn.textContent = 'Refreshing…';
      try {
        const r = await fetch('/chapters/refresh-all', { method: 'POST' });
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        await loadChapters();
        flash('All fits refreshed');
      } catch (e) {
        flash(`Refresh all failed: ${e.message || e}`, true);
      } finally {
        btn.disabled = false; btn.textContent = 'Refresh all fits';
      }
    });

    loadChapters();
  </script>
</body>
</html>
