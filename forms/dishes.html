<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Dish Library</title>

  <!-- ============================================================
       TEMPLATE NOTE (for future entity-library pages like cookbooks)
       ------------------------------------------------------------
       This page uses the shared library-shell pattern. To create a new
       admin page for a different entity (cookbooks, taxonomies, etc.):

         1. Copy this file → forms/<entity>.html
         2. Find/replace "dish" → "<entity>" (Dish → <Entity>, etc.)
         3. Adjust the entity-specific bits:
              - Endpoint paths in fetch() calls (/dishes → /cookbooks)
              - Field set in renderViewCard / renderEditForm / renderAddForm
              - Actions in the footer (Run is dish-specific; cookbooks
                might have "Import" or no equivalent)
              - Entity-specific badges/result-panel styles in <style>
         4. New backend table + CRUD endpoints in:
              - input/pipeline/<entity>.py  (CRUD helpers)
              - save_recipe_api.py          (FastAPI endpoints)

       The shared shell handles:
         - Fixed header + hamburger + page title
         - Sliding sidebar with search + add-new + list
         - iOS body lock when sidebar open (no overscroll drift)
         - Action footer with primary/secondary/danger buttons
         - Detail card / form fields / empty state styling
       ============================================================ -->

  <link rel="stylesheet" href="/forms/forms.css">
  <link rel="stylesheet" href="/forms/library-shell.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /* Dish-specific badges + run-result panel. Everything else (layout,
       sidebar, header, footer, fields) lives in library-shell.css. */
    /* Chapter group header inside the sidebar list. Non-clickable —
       just a thin uppercase divider above each chapter's dishes. */
    .chapter-header {
      list-style: none;
      cursor: default;
      padding: 14px 12px 4px;
      margin: 6px 0 2px;
      border: none !important;
      background: transparent !important;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      font-size: 0.7em;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted, #74695f);
      display: flex; justify-content: space-between; align-items: baseline;
      border-top: 1px solid var(--line, #d8d2c4) !important;
    }
    .chapter-header:first-child { border-top: none !important; padding-top: 6px; margin-top: 0; }
    .chapter-header:hover { background: transparent !important; }
    .chapter-header .chapter-count {
      font-family: ui-monospace, 'SF Mono', Menlo, monospace;
      font-size: 0.95em;
      font-weight: 400;
      letter-spacing: 0;
      color: var(--muted, #74695f);
      opacity: 0.7;
    }

    .badge {
      display: inline-block; padding: 1px 7px; border-radius: 999px;
      font-size: 0.7em; font-weight: 600; letter-spacing: 0.02em;
      line-height: 1.4;
    }
    .badge-success { background: #e7f6e8; color: #2f7a3a; border: 1px solid #b9dfbe; }
    .badge-error   { background: #fce8e8; color: #a23131; border: 1px solid #f0b6b6; }
    .badge-never   { background: #f4eedb; color: #8a6b1f; border: 1px solid #e0d2a3; }
    .badge-due     { background: #fff3d6; color: #7a4f00; border: 1px solid #f0d8a0; }

    .run-result {
      margin-top: 16px; padding: 12px 14px; background: #f7f4ec;
      border: 1px solid var(--line); border-radius: 10px; font-size: 0.9em;
    }
    .run-result .row { margin-bottom: 4px; }
    .run-result .label { color: var(--muted); margin-right: 6px; }
    .run-result .value { font-family: ui-monospace, "SF Mono", Menlo, monospace; }
    .run-result details { margin-top: 6px; }
    .run-result details summary { cursor: pointer; color: var(--accent); }
    .run-result .url-list {
      margin: 6px 0 0; padding-left: 18px; font-size: 0.86em;
      color: var(--muted);
    }

    /* Rejected URLs panel — read-only diagnostic for the most recent
       refresh. Visually distinct from the run-result success panel
       so the user knows these are "almost made it" candidates worth
       manual recovery, not failures. */
    .rejects-details {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px 14px;
      background: #fdfaf2;
    }
    .rejects-details summary {
      cursor: pointer;
      font-size: 0.95em;
      list-style: none;
      user-select: none;
    }
    .rejects-details summary::-webkit-details-marker { display: none; }
    .rejects-details summary::before {
      content: '▸ ';
      color: var(--accent);
      transition: transform 0.15s ease;
    }
    .rejects-details[open] summary::before { content: '▾ '; }

    /* Top recipes panel — the master rows from the last refresh.
       Compact list with rank, name, source link, host, grade badge,
       and PA/DA/OU. Distinct visual register from rejects (lighter
       background) so the curated set reads as "the winners". */
    .top-recipes-panel { margin-top: 4px; }
    .top-recipes-header {
      font-size: 1.0em;
      margin: 0 0 8px;
      color: var(--ink);
      font-family: Georgia, 'Times New Roman', serif;
      font-weight: 600;
    }
    .top-recipes-subline {
      color: var(--muted, #74695f);
      font-weight: normal;
      font-style: italic;
      font-size: 0.86em;
      margin-left: 6px;
    }
    .top-recipes-list { display: flex; flex-direction: column; gap: 6px; }
    .top-recipe-row {
      display: flex;
      gap: 12px;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--accent-soft, rgba(155, 74, 34, 0.04));
      font-size: 0.92em;
      transition: background 120ms ease;
    }
    .top-recipe-row:hover { background: var(--accent-soft, rgba(155, 74, 34, 0.09)); }
    .top-recipe-tile {
      flex: 0 0 auto;
      display: block;
      width: 88px; height: 66px;     /* 4:3 — "link preview" shape */
      border-radius: 6px;
      overflow: hidden;
      background: var(--bg, #f8f4ef);
      border: 1px solid var(--line);
    }
    .top-recipe-tile img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
    .top-recipe-tile.empty {
      background:
        repeating-linear-gradient(
          45deg,
          var(--bg, #f8f4ef) 0 8px,
          var(--line) 8px 9px
        );
    }
    .top-recipe-body { flex: 1; min-width: 0; }
    .top-recipe-main {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .top-rank {
      display: inline-block;
      min-width: 28px;
      padding: 2px 6px;
      background: var(--accent);
      color: #fff;
      border-radius: 4px;
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
      font-size: 0.78em;
      font-weight: 600;
      text-align: center;
    }
    .top-recipe-title {
      color: var(--ink);
      font-weight: 600;
      font-family: Georgia, 'Times New Roman', serif;
    }
    .top-recipe-host {
      color: var(--muted, #74695f);
      font-size: 0.85em;
      font-style: italic;
    }
    .top-recipe-meta {
      display: flex; align-items: center; gap: 10px;
      margin-top: 4px;
      font-size: 0.82em;
      color: var(--muted, #74695f);
    }
    .top-scores {
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
    }
    /* Action buttons — one primary (BCC copy), one secondary (source).
       Editorial register, small, inline. Sit on their own row under
       the meta strip. */
    .top-recipe-actions {
      display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap;
    }
    .top-action {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 10px;
      border-radius: 4px;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 0.82em;
      font-weight: 500;
      text-decoration: none;
      transition: background 120ms ease, color 120ms ease;
      line-height: 1.3;
      white-space: nowrap;
    }
    .top-action-primary {
      background: var(--accent);
      color: #fff;
    }
    .top-action-primary:hover {
      background: var(--accent-dark, #7a3818);
    }
    .top-action-secondary {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--line);
    }
    .top-action-secondary:hover {
      background: var(--accent-soft, rgba(155, 74, 34, 0.06));
      border-color: var(--accent);
    }
    .top-action-arrow {
      font-size: 0.86em;
      opacity: 0.75;
    }

    .rejects-list { display: flex; flex-direction: column; gap: 8px; }
    .reject-row {
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      font-size: 0.88em;
    }
    .reject-row-main {
      display: flex; align-items: center; flex-wrap: wrap; gap: 6px;
    }
    .reject-title {
      font-weight: 500;
      color: var(--ink);
      text-decoration: none;
      border-bottom: 1px dotted transparent;
    }
    .reject-title:hover {
      color: var(--accent-dark);
      border-bottom-color: var(--accent);
    }
    .reject-host {
      color: var(--muted);
      font-size: 0.85em;
    }
    .reject-meta {
      display: flex; justify-content: space-between; gap: 12px;
      margin-top: 4px;
      font-size: 0.82em;
      color: var(--muted);
    }
    .reject-reason {
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 0.92em;
    }
    .reject-scores {
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      white-space: nowrap;
    }
    .qualify-badge {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 999px;
      font-size: 0.7em;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      background: #e7f6e8;
      color: #2f7a3a;
      border: 1px solid #b9dfbe;
    }
    /* Per-status row dimming. 'new' rows stay full opacity (actionable);
       marked rows fade to ~55% so the curator's eye lands on fresh
       discoveries first while still seeing the institutional memory. */
    .reject-row.status-recovered  { opacity: 0.55; background: #f4f9ee; border-color: #cfe6c9; }
    .reject-row.status-skipped    { opacity: 0.55; background: #fafafa; }
    .reject-row.status-unreachable { opacity: 0.55; background: #fbf2ea; border-color: #e3cdb3; }
    /* Row controls — status select + notes input, sit below the meta line. */
    .reject-controls {
      display: flex; align-items: center; gap: 8px;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px dashed var(--line);
      flex-wrap: wrap;
    }
    .reject-status-label {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 0.82em; color: var(--muted);
    }
    .reject-status {
      padding: 3px 6px; font-size: 0.86em;
      border: 1px solid var(--line); border-radius: 6px;
      background: #fff; cursor: pointer;
    }
    .reject-notes {
      flex: 1; min-width: 140px;
      padding: 4px 8px; font-size: 0.86em;
      border: 1px solid var(--line); border-radius: 6px;
      background: #fff;
    }
    .reject-marked {
      font-size: 0.78em; color: var(--muted); font-style: italic;
    }

    /* Live SSE log panel — shown while a job is running, persists after
       completion so the user can review what happened. */
    .live-log {
      margin-top: 16px; border: 1px solid var(--line); border-radius: 10px;
      background: #1f1d1a; color: #e4dcc8; overflow: hidden;
    }
    .live-log-header {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 12px; background: #2a2723; color: #f0e7d4;
      border-bottom: 1px solid #3a3530; font-size: 0.86em;
    }
    .live-log-status {
      display: inline-block; padding: 1px 8px; border-radius: 999px;
      font-size: 0.72em; font-weight: 600; letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .live-log-status.queued   { background: #4a3f1a; color: #f0d8a0; }
    .live-log-status.running  { background: #1a4a3f; color: #a0e8d8; }
    .live-log-status.success  { background: #1a4a1f; color: #b9dfbe; }
    .live-log-status.error,
    .live-log-status.cancelled { background: #4a1a1a; color: #f0b6b6; }
    .live-log-body {
      margin: 0; padding: 10px 14px; max-height: 360px; overflow-y: auto;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 0.8em; line-height: 1.45; white-space: pre-wrap;
      word-break: break-word;
    }
    .live-log-body > div { padding: 1px 0; }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">☰</button>
      <h1>Dish Library</h1>
    </div>
  </header>

  <aside class="sidebar" id="sidebar">
    <h2>Dishes <span class="count" id="dishCount"></span></h2>
    <div class="sidebar-controls">
      <button type="button" class="add-new-btn" id="addNewBtn">+ Add new dish</button>
      <input type="search" id="searchInput" placeholder="Search dishes…" />
    </div>
    <ul class="entity-list" id="dishList">
      <li class="empty-state">Loading…</li>
    </ul>

    <!-- Suggested dishes — clusters of carded recipes whose
         `_identity.likelyDish` doesn't match any library entry.
         Powered by /dishes/suggestions; >=3-recipe threshold filters
         out idiosyncratic LLM outputs. Each row is a one-click
         pre-fill of the Add Dish form. -->
    <div id="suggestionsSection" style="margin-top:18px;display:none">
      <h3 style="font-size:0.95em;margin:0 0 6px;color:var(--muted)">
        Suggested dishes
        <span style="color:var(--muted);font-weight:normal" id="suggestionCount"></span>
      </h3>
      <div style="font-size:0.78em;color:var(--muted);margin-bottom:8px;line-height:1.4">
        Recipes are calling these out as their dish, but no library entry exists.
        Click to pre-fill <strong>Add new dish</strong>.
      </div>
      <ul class="entity-list" id="suggestionList" style="margin:0"></ul>
    </div>
  </aside>

  <div class="container">
    <main id="detailPanel">
      <div class="detail-empty">
        <p>Pick a dish from the sidebar (☰) to view, run, or edit.</p>
        <p>Or click <strong>+ Add new dish</strong> to create one.</p>
      </div>
    </main>
  </div>

  <footer class="action-footer" id="actionFooter" style="display:none">
    <div class="button-row" id="footerButtons"></div>
  </footer>

  <script src="/forms/library-shell.js?v=20260529a"></script>
  <script>
    const API = window.location.origin;
    const $ = (sel) => document.querySelector(sel);
    const { escapeHtml, fmtDate, closeOnNarrow } = LibraryShell;

    // Wire the sidebar toggle + iOS body lock. (Click-outside-closes is
    // wired by init() too.)
    LibraryShell.init({
      sidebarSelector: '#sidebar',
      sidebarToggleSelector: '#sidebarToggle',
    });
    // Cross-page nav (right-side ⋮). currentPage marks the active row.
    LibraryShell.initNav({ currentPage: 'dishes' });

    // In-memory cache + UI state.
    let dishes = {};          // name -> dish dict
    let selectedName = null;
    let mode = 'empty';       // 'empty' | 'view' | 'edit' | 'add'
    let searchTerm = '';

    function statusBadge(d) {
      if (d.is_due && d.last_refreshed) return `<span class="badge badge-due">due</span>`;
      if (!d.last_refreshed)            return `<span class="badge badge-never">never</span>`;
      if (d.last_run_status === 'success') return `<span class="badge badge-success">ok</span>`;
      if (d.last_run_status && d.last_run_status.startsWith('error')) return `<span class="badge badge-error">err</span>`;
      return '';
    }

    // ===== Sidebar list rendering — grouped by chapter =====
    // Dishes are bucketed by their `chapter` column (chapter classifier
    // output stamped at create-time + refresh). Within each chapter,
    // dishes sort alphabetically; chapters themselves sort alphabetically
    // too, with "Unassigned" (no chapter yet) pinned to the bottom so
    // newly-created rows that haven't been classified surface clearly.
    function renderList() {
      const term = searchTerm.toLowerCase();
      const filtered = Object.values(dishes).filter(d =>
        !term ||
        d.name.toLowerCase().includes(term) ||
        (d.queries || []).some(q => q.toLowerCase().includes(term)) ||
        (d.notes || '').toLowerCase().includes(term) ||
        (d.chapter || '').toLowerCase().includes(term)
      );
      $('#dishCount').textContent = String(filtered.length);
      const listEl = $('#dishList');
      if (!filtered.length) {
        listEl.innerHTML = '<li class="empty-state">' +
          (term ? 'No matches.' : 'No dishes yet. Click + Add new dish.') + '</li>';
        return;
      }

      // Bucket by chapter label
      const buckets = new Map();
      for (const d of filtered) {
        const ch = (d.chapter || '').trim() || '—';
        if (!buckets.has(ch)) buckets.set(ch, []);
        buckets.get(ch).push(d);
      }
      // Sort dishes within each chapter
      for (const arr of buckets.values()) {
        arr.sort((a, b) => a.name.localeCompare(b.name));
      }
      // Chapter order: alphabetical, with "—" pinned last
      const chapterNames = Array.from(buckets.keys()).sort((a, b) => {
        if (a === '—' && b !== '—') return 1;
        if (b === '—' && a !== '—') return -1;
        return a.localeCompare(b);
      });

      listEl.innerHTML = '';
      for (const ch of chapterNames) {
        const header = document.createElement('li');
        header.className = 'chapter-header';
        const label = ch === '—' ? 'Unassigned' : ch;
        header.innerHTML = `<span>${escapeHtml(label)}</span><span class="chapter-count">${buckets.get(ch).length}</span>`;
        listEl.appendChild(header);
        for (const d of buckets.get(ch)) {
          const li = document.createElement('li');
          if (d.name === selectedName) li.classList.add('selected');
          const queries = Array.isArray(d.queries) ? d.queries : [];
          const queryHint = queries.length === 1 ? queries[0] : `${queries.length} queries`;
          li.innerHTML =
            `<div class="entity-name">${escapeHtml(d.name)} ${statusBadge(d)}</div>` +
            `<div class="entity-meta">${escapeHtml(queryHint)} · top ${escapeHtml(d.top_n_final)} · last: ${escapeHtml(fmtDate(d.last_refreshed))}</div>`;
          li.addEventListener('click', () => {
            selectedName = d.name;
            mode = 'view';
            renderList();
            renderDetail();
            closeOnNarrow();
          });
          listEl.appendChild(li);
        }
      }
    }

    $('#searchInput').addEventListener('input', (e) => {
      searchTerm = e.target.value || '';
      renderList();
    });

    $('#addNewBtn').addEventListener('click', () => {
      selectedName = null;
      mode = 'add';
      renderList();
      renderDetail();
      closeOnNarrow();
    });

    // ===== Detail panel rendering =====
    function renderDetail() {
      if (mode === 'empty' || (mode === 'view' && !dishes[selectedName])) {
        $('#detailPanel').innerHTML =
          `<div class="detail-empty">` +
          `<p>Pick a dish from the sidebar (☰) to view, run, or edit.</p>` +
          `<p>Or click <strong>+ Add new dish</strong> to create one.</p>` +
          `</div>`;
        $('#actionFooter').style.display = 'none';
        return;
      }
      if (mode === 'add')  { renderAddForm(); return; }
      if (mode === 'edit') { renderEditForm(dishes[selectedName]); return; }
      renderViewCard(dishes[selectedName]);
    }

    // ---------------------------------------------------------------
    // OU regression fit panel — same data shape that chapters.html shows
    // in its detail view. Dishes.last_ou_fit and chapters.last_ou_fit
    // are byte-identical fit blobs produced by the same _compute_custom_ou
    // path, so the two pages render parallel information for parallel
    // cohorts (dish vs chapter). Renders nothing when last_ou_fit is
    // absent (dish never refreshed) or used=False (n<25 — fit skipped).
    // ---------------------------------------------------------------
    function _num(v, digits) {
      if (v == null) return '—';
      const n = Number(v);
      if (!isFinite(n)) return '—';
      return n.toFixed(digits == null ? 4 : digits);
    }
    function _formulaHtml(fit) {
      if (!fit || !Array.isArray(fit.coefficients)) return '';
      const c = fit.coefficients.map(x => Number(x).toFixed(4));
      let body;
      if      (fit.model === 'linear')    body = `predicted PA = ${c[0]} · DA + ${c[1]}`;
      else if (fit.model === 'quadratic') body = `predicted PA = ${c[0]} · DA² + ${c[1]} · DA + ${c[2]}`;
      else if (fit.model === 'power')     body = `predicted PA = ${c[0]} · DA ^ ${c[1]}`;
      else body = c.join(', ');
      return `<div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--line);font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:0.85em;color:var(--muted)">${escapeHtml(body)}</div>`;
    }
    function renderDishFitPanel(d) {
      let fit = d.last_ou_fit;
      if (typeof fit === 'string') {
        try { fit = JSON.parse(fit); } catch (e) { fit = null; }
      }
      // No fit at all → don't render the section (form stays compact).
      if (!fit) return '';
      const hasFit = !!fit.used;
      const bottom = (typeof d.last_run_bottom_ou === 'number') ? d.last_run_bottom_ou : null;

      const fitBody = hasFit
        ? `<div style="display:grid;grid-template-columns:200px 1fr;column-gap:18px;row-gap:8px;font-size:0.92em">` +
            `<div style="color:var(--muted)">model</div>` +
            `<div style="font-family:ui-monospace,SFMono-Regular,Consolas,monospace">${escapeHtml(fit.model)} · R² ${_num(fit.r2_chosen)}</div>` +
            `<div style="color:var(--muted)">corpus n</div>` +
            `<div style="font-family:ui-monospace,SFMono-Regular,Consolas,monospace">${escapeHtml(fit.n)}</div>` +
            `<div style="color:var(--muted)">σ observed</div>` +
            `<div style="font-family:ui-monospace,SFMono-Regular,Consolas,monospace">${_num(fit.sigma_observed)}</div>` +
            `<div style="color:var(--muted)">σ effective</div>` +
            `<div style="font-family:ui-monospace,SFMono-Regular,Consolas,monospace">${_num(fit.sigma_effective)} · floor ${fit.exc_sigma_floor}</div>` +
            `<div style="color:var(--muted)">R² linear / quadratic / power</div>` +
            `<div style="font-family:ui-monospace,SFMono-Regular,Consolas,monospace">${_num(fit.r2_linear)} · ${_num(fit.r2_quadratic)} · ${_num(fit.r2_power)}</div>` +
            `<div style="color:var(--muted)">grade scale</div>` +
            `<div style="font-family:ui-monospace,SFMono-Regular,Consolas,monospace">base ${fit.exc_base} · σ mult ${fit.exc_sigma_mult}</div>` +
            (bottom != null
              ? `<div style="color:var(--muted)">bar to beat (bottom OU)</div>` +
                `<div style="font-family:ui-monospace,SFMono-Regular,Consolas,monospace">${bottom.toFixed(2)}</div>`
              : '') +
          `</div>` +
          _formulaHtml(fit)
        : `<div style="color:var(--muted);font-size:0.92em;line-height:1.5">` +
            `No fit on the last run — only <strong>${escapeHtml(fit.n)}</strong> URL${fit.n === 1 ? '' : 's'} ` +
            `had usable DA + PA scores (regression needs ≥25). Grading falls back to the chapter cohort.` +
          `</div>`;

      return `<div class="field full" style="margin-top:18px">` +
        `<label>OU regression fit <span class="hint">(grading cohort for this dish)</span></label>` +
        fitBody +
        `<details id="fitDataDetails" style="margin-top:16px;font-size:0.92em" open>` +
          `<summary style="cursor:pointer;color:var(--accent);font-weight:600;user-select:none">` +
            `Regression data points <span id="fitDataHint" class="hint" style="margin-left:6px;font-weight:400"></span>` +
          `</summary>` +
          `<div id="fitDataBody" style="margin-top:12px"></div>` +
        `</details>` +
      `</div>`;
    }

    // Fetches /dishes/<name>/fit-data and renders the (URL, DA, PA,
    // status) table inside #fitDataBody. Called once when the user
    // first toggles the <details> open (lazy load).
    async function loadFitData(dishName) {
      const body = document.getElementById('fitDataBody');
      const hint = document.getElementById('fitDataHint');
      if (!body) return;
      body.innerHTML = '<div style="color:var(--muted);font-size:0.9em">Loading…</div>';
      try {
        const r = await fetch(`${API}/dishes/${encodeURIComponent(dishName)}/fit-data`);
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        const rows = await r.json();
        if (!rows.length) {
          body.innerHTML = '<div style="color:var(--muted);font-size:0.9em">No data points captured yet — run a refresh to populate.</div>';
          if (hint) hint.textContent = '';
          return;
        }
        const counts = rows.reduce((acc, x) => { acc[x.status] = (acc[x.status] || 0) + 1; return acc; }, {});
        if (hint) hint.textContent = `n=${rows.length}  ·  saved ${counts.saved || 0}  ·  rejected ${counts.rejected || 0}  ·  ou-floor ${counts.dropped || 0}`;
        const statusStyle = {
          saved:    'color:#2f7a3a',
          rejected: 'color:#a23131',
          dropped:  'color:var(--muted)',
        };
        const rowHtml = rows.map(r => {
          const host = (() => { try { return new URL(r.url).hostname.replace(/^www\./, ''); } catch (e) { return r.url; } })();
          const daStr = (typeof r.da === 'number') ? r.da.toFixed(0) : '—';
          const paStr = (typeof r.pa === 'number') ? r.pa.toFixed(0) : '—';
          return `<tr style="border-bottom:1px solid var(--line)">` +
            `<td style="padding:6px 8px"><a href="${escapeHtml(r.url)}" target="_blank" rel="noopener" style="color:var(--ink);text-decoration:none">${escapeHtml(host)}</a></td>` +
            `<td style="padding:6px 8px;font-family:ui-monospace,SFMono-Regular,Consolas,monospace;text-align:right">${daStr}</td>` +
            `<td style="padding:6px 8px;font-family:ui-monospace,SFMono-Regular,Consolas,monospace;text-align:right">${paStr}</td>` +
            `<td style="padding:6px 8px;font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:0.85em;${statusStyle[r.status] || ''}">${escapeHtml(r.status)}</td>` +
            `</tr>`;
        }).join('');
        body.innerHTML =
          `<table style="width:100%;border-collapse:collapse;font-size:0.88em">` +
            `<thead><tr style="text-align:left;border-bottom:1px solid var(--line);color:var(--muted)">` +
              `<th style="padding:6px 8px;font-weight:500">domain</th>` +
              `<th style="padding:6px 8px;font-weight:500;text-align:right">DA</th>` +
              `<th style="padding:6px 8px;font-weight:500;text-align:right">PA</th>` +
              `<th style="padding:6px 8px;font-weight:500">status</th>` +
            `</tr></thead><tbody>${rowHtml}</tbody>` +
          `</table>`;
      } catch (err) {
        body.innerHTML = `<div style="color:#a23131;font-size:0.9em">Failed to load: ${escapeHtml(err.message || String(err))}</div>`;
      }
    }

    function renderViewCard(d) {
      const queries = Array.isArray(d.queries) ? d.queries : [];
      const logLinkHtml = d.last_run_log_url
        ? ` · <a href="${escapeHtml(d.last_run_log_url)}" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:underline">view latest log</a>`
        : '';
      $('#detailPanel').innerHTML =
        `<div class="detail-card" id="detailCard">` +
          `<h2>${escapeHtml(d.name)} ${statusBadge(d)}</h2>` +
          `<div class="subline">` +
            (d.chapter ? `<span class="pill">${escapeHtml(d.chapter)}</span>` : '') +
            `<span class="pill">SerpAPI ${escapeHtml(d.top_n_serpapi)}/query</span>` +
            `<span class="pill">top ${escapeHtml(d.top_n_final)}</span>` +
            `<span class="pill">TTL ${d.refresh_ttl_days == null ? 'manual' : (d.refresh_ttl_days + 'd')}</span>` +
            `<span>last run: ${escapeHtml(fmtDate(d.last_refreshed))}` +
              (d.last_run_count != null ? ` (${escapeHtml(d.last_run_count)} saved)` : '') +
              logLinkHtml +
            `</span>` +
          `</div>` +
          (d.description ? `<div class="field full">` +
            `<label>Description</label>` +
            `<div class="locked" style="font-family:inherit;background:transparent;border-style:solid;white-space:pre-wrap">${escapeHtml(d.description)}</div>` +
          `</div>` : '') +
          `<div class="field full"${d.description ? ' style="margin-top:14px"' : ''}>` +
            `<label>Queries</label>` +
            `<div class="locked">${queries.map(q => escapeHtml(q)).join('<br>')}</div>` +
          `</div>` +
          (d.notes ? `<div class="field full" style="margin-top:14px">` +
            `<label>Notes</label>` +
            `<div class="locked" style="font-family:inherit;background:transparent;border-style:solid">${escapeHtml(d.notes)}</div>` +
          `</div>` : '') +
          // Identity card — structured cohort fingerprint. The embed
          // text the matcher sees is derived from this card, so what
          // the curator sees here IS what the embedder sees.
          (d.identity_card && d.identity_card.likelyDish ?
            (() => {
              const c = d.identity_card;
              const primary = Array.isArray(c.primaryIngredients) ? c.primaryIngredients.join(', ') : '';
              const roles = Array.isArray(c.ingredientRoles) ? c.ingredientRoles : [];
              const rolesHtml = roles.map(r =>
                `<tr><td style="padding:3px 6px">${escapeHtml(r.text || '')}</td>` +
                `<td style="padding:3px 6px;color:var(--muted);font-family:ui-monospace,SFMono-Regular,Consolas,monospace">${escapeHtml(r.role || '')}</td></tr>`
              ).join('');
              return `<div class="field full" style="margin-top:14px">` +
                `<label>Identity card <span class="hint">structured cohort fingerprint</span></label>` +
                `<div style="padding:10px;background:var(--bg);border:1px solid var(--line);border-radius:6px">` +
                  `<div style="font-weight:600;color:var(--accent);font-size:1.02em;margin-bottom:6px">${escapeHtml(c.likelyDish)}</div>` +
                  `<div style="display:grid;grid-template-columns:120px 1fr;gap:4px 12px;font-size:0.88em">` +
                    `<div style="color:var(--muted)">Cuisine</div><div>${escapeHtml(c.cuisine || '—')}</div>` +
                    `<div style="color:var(--muted)">Ethnicity</div><div>${escapeHtml(c.ethnicity || '—')}</div>` +
                    `<div style="color:var(--muted)">Primary</div><div style="font-family:ui-monospace,SFMono-Regular,Consolas,monospace">${escapeHtml(primary || '—')}</div>` +
                    `<div style="color:var(--muted)">Technique</div><div>${escapeHtml(c.technique || '—')}</div>` +
                    `<div style="color:var(--muted)">Serving</div><div>${escapeHtml(c.servingForm || '—')}</div>` +
                  `</div>` +
                  (rolesHtml ?
                    `<details style="margin-top:10px;font-size:0.85em">` +
                      `<summary style="cursor:pointer;color:var(--muted)">Ingredient roles (${roles.length})</summary>` +
                      `<table style="width:100%;margin-top:6px;border-collapse:collapse">` +
                        `<thead><tr style="text-align:left;border-bottom:1px solid var(--line)">` +
                          `<th style="padding:4px 6px;font-weight:600;color:var(--muted)">Ingredient</th>` +
                          `<th style="padding:4px 6px;font-weight:600;color:var(--muted)">Role</th>` +
                        `</tr></thead><tbody>${rolesHtml}</tbody>` +
                      `</table>` +
                    `</details>`
                  : '') +
                `</div>` +
              `</div>`;
            })()
          : '') +
          // Matching profile — the exact text fed into the embedder,
          // the model name, and when it was last computed. Lets the
          // curator verify their description/card edits propagated.
          (d.embedding_text ?
            `<div class="field full" style="margin-top:14px">` +
              `<label>Matching profile <span class="hint">(model ${escapeHtml(d.embedding_model || '—')} · embedded ${escapeHtml(fmtDate(d.embedding_updated_at))})</span></label>` +
              `<div class="locked" style="font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:0.85em;background:transparent;border-style:solid;white-space:pre-wrap">${escapeHtml(d.embedding_text)}</div>` +
            `</div>` : '') +
          renderDishFitPanel(d) +
          `<div id="topRecipesSection" style="margin-top:18px"></div>` +
          `<div id="rejectsSection" style="margin-top:18px"></div>` +
        `</div>`;
      $('#footerButtons').innerHTML =
        `<button type="button" class="primary" id="runBtn">Run</button>` +
        `<button type="button" class="secondary" id="editBtn">Edit</button>` +
        `<button type="button" class="danger" id="deleteBtn">Delete</button>` +
        `<div class="feedback" id="feedback"></div>`;
      $('#actionFooter').style.display = '';
      $('#runBtn').addEventListener('click', () => doRun(d));
      $('#editBtn').addEventListener('click', () => { mode = 'edit'; renderDetail(); });
      $('#deleteBtn').addEventListener('click', () => doDelete(d));
      // Fire-and-forget reject load. The section stays hidden until
      // the fetch returns, so an empty/never-refreshed dish doesn't
      // flash "Rejected URLs" briefly before disappearing.
      loadRejects(d.name);
      // Wire the lazy data-points table: load the (URL, DA, PA) rows
      // the first time the <details> is opened. Free for dishes whose
      // curator never expands it.
      const fitDetails = document.getElementById('fitDataDetails');
      if (fitDetails) {
        let loaded = false;
        const ensureLoaded = () => {
          if (fitDetails.open && !loaded) {
            loaded = true;
            loadFitData(d.name);
          }
        };
        fitDetails.addEventListener('toggle', ensureLoaded);
        // The panel renders with `open` set, so the `toggle` event never
        // fires on initial mount — load now if it's already open. Without
        // this the data-points table stays empty until the user manually
        // closes and reopens the <details>.
        ensureLoaded();
      }
      // Top recipes — the master rows from the last refresh, with
      // ranks + grades + links back to the original sources.
      loadTopRecipes(d.name);
    }

    // ===== Top recipes section =====
    // Fetches /dishes/<name>/top-recipes and renders the curated
    // master rows. Each row links to its source URL (the original
    // authoring site) and the BCC permalink (our saved master copy).
    async function loadTopRecipes(dishName) {
      const section = document.getElementById('topRecipesSection');
      if (!section) return;
      try {
        const res = await fetch(`${API}/dishes/${encodeURIComponent(dishName)}/top-recipes`);
        if (!res.ok) { section.innerHTML = ''; return; }
        const payload = await res.json();
        const recipes = payload.recipes || [];
        if (!recipes.length) { section.innerHTML = ''; return; }
        section.innerHTML = renderTopRecipes(payload);
      } catch (err) {
        section.innerHTML = '';
        console.error('top-recipes fetch failed:', err);
      }
    }

    function renderTopRecipes(payload) {
      const recipes = payload.recipes || [];
      const rows = recipes.map((r) => {
        const hostname = (() => {
          try { return new URL(r.source_url).hostname.replace(/^www\./, ''); }
          catch { return r.source_url || '—'; }
        })();
        const rankBadge = (typeof r.rank === 'number')
          ? `<span class="top-rank">#${r.rank}</span>` : '';
        const excBadgeHtml = (r.grade && r.exc_score != null
                              && window.LibraryShell && LibraryShell.renderExcBadge)
          ? LibraryShell.renderExcBadge(
              { grade: r.grade, score: r.exc_score, basis: r.exc_basis || {} },
              { size: 'small' }
            )
          : '';
        const scoreParts = [];
        if (typeof r.da === 'number') scoreParts.push(`DA ${r.da.toFixed(0)}`);
        if (typeof r.pa === 'number') scoreParts.push(`PA ${r.pa.toFixed(0)}`);
        if (typeof r.ou === 'number') scoreParts.push(`OU ${r.ou.toFixed(2)}`);
        const scoreLine = scoreParts.length
          ? `<span class="top-scores">${escapeHtml(scoreParts.join(' · '))}</span>`
          : '';
        const sourceHref = r.source_url || '#';
        const bccHref = r.bcc_url || '';
        // Preview tile: cooped og:image (preferred, locally hosted)
        // or the hotlinked schema.org image as a fallback for
        // pre-coopt rows. Tile clicks to BCC (our copy) so the
        // image-as-link affordance matches the primary action button.
        // Source link is the explicit secondary button.
        const previewSrc = (r.preview_image || r.fallback_image || '').trim();
        const tileHref = bccHref || sourceHref;
        const tile = previewSrc
          ? `<a class="top-recipe-tile" href="${escapeHtml(tileHref)}" target="_blank" rel="noopener" title="Open in BCC">` +
              `<img src="${escapeHtml(previewSrc)}" alt="" loading="lazy" />` +
            `</a>`
          : `<div class="top-recipe-tile empty"></div>`;
        // Two-button choice: primary = our BCC copy, secondary = the
        // original source. The user asked for explicit buttons so the
        // choice isn't hidden in a tile-vs-title ambiguity.
        const actionButtons =
          `<div class="top-recipe-actions">` +
            (bccHref
              ? `<a class="top-action top-action-primary" href="${escapeHtml(bccHref)}" target="_blank" rel="noopener" title="Open the saved copy in BCC">Open in BCC</a>`
              : '') +
            `<a class="top-action top-action-secondary" href="${escapeHtml(sourceHref)}" target="_blank" rel="noopener" title="${escapeHtml(r.source_url || '')}">View source <span class="top-action-arrow">↗</span></a>` +
          `</div>`;
        return (
          `<div class="top-recipe-row">` +
            tile +
            `<div class="top-recipe-body">` +
              `<div class="top-recipe-main">` +
                rankBadge +
                `<span class="top-recipe-title">${escapeHtml(r.name)}</span>` +
                ` <span class="top-recipe-host">${escapeHtml(hostname)}</span>` +
                (excBadgeHtml ? ' ' + excBadgeHtml : '') +
              `</div>` +
              `<div class="top-recipe-meta">` +
                scoreLine +
              `</div>` +
              actionButtons +
            `</div>` +
          `</div>`
        );
      }).join('');
      return (
        `<div class="top-recipes-panel">` +
          `<h3 class="top-recipes-header">` +
            `Top recipes <span class="top-recipes-subline">(curated set, last refresh ${escapeHtml(fmtDate(payload.refreshed_at))})</span>` +
          `</h3>` +
          `<div class="top-recipes-list">${rows}</div>` +
        `</div>`
      );
    }

    // ===== Rejected URLs section =====
    // Fetches /dishes/<name>/rejects on view, renders a collapsible
    // panel showing every URL that made it past the batch's front-end
    // (filter_disallowed + is_recipe + Moz) but then failed extract /
    // save / save-gate. Each row gets a "WOULD QUALIFY" badge if its
    // custom OU exceeds the dish's last_run_bottom_ou — actionable
    // hint that bookmarketting the URL and saving to master would
    // give us a recipe whose score beats the current weakest entry.
    async function loadRejects(dishName) {
      const section = document.getElementById('rejectsSection');
      if (!section) return;
      try {
        const res = await fetch(`${API}/dishes/${encodeURIComponent(dishName)}/rejects`);
        if (!res.ok) { section.innerHTML = ''; return; }
        const payload = await res.json();
        // Always render the run-summary panel when the dish HAS a fit
        // (last_ou_fit is present). The rejects list inside the panel
        // can be empty — that's a meaningful UX state, not a bug. Only
        // skip rendering when there's no fit data at all (dish never
        // refreshed, or a pre-fit-instrumentation run).
        const hasFitData = payload.ou_fit || (typeof payload.bottom_ou === 'number');
        const hasRejects = (payload.rejects || []).length > 0;
        if (!hasFitData && !hasRejects) { section.innerHTML = ''; return; }
        section.innerHTML = renderRejects(payload);
        if (hasRejects) wireRejectControls(dishName);
      } catch (err) {
        section.innerHTML = '';
        console.error('rejects fetch failed:', err);
      }
    }

    function renderRejects(payload) {
      const rejects = payload.rejects || [];
      const bottom = (typeof payload.bottom_ou === 'number') ? payload.bottom_ou : null;
      const fit = payload.ou_fit || null;
      // Fit summary line — model + R² + σ (the grading scale) + bottom OU.
      // σ matters: it's the denominator in the Exceptionalism T-score, so
      // a small σ means small absolute OU differences swing big grade
      // changes, and large σ means the cohort is dispersed and only big
      // outliers earn A grades. Exposing it makes the grade defensible.
      const sigmaStr = (fit && typeof fit.sigma_effective === 'number')
        ? ` · σ=<strong>${fit.sigma_effective.toFixed(2)}</strong>` +
          (fit.sigma_observed != null && Math.abs(fit.sigma_observed - fit.sigma_effective) > 0.001
            ? ` <em style="font-size:0.85em;color:var(--muted,#74695f)">(σ_obs ${fit.sigma_observed.toFixed(2)}, floored)</em>` : '')
        : '';
      const fitLine = fit && fit.used
        ? `<div class="subline" style="margin-top:4px">OU fit: <strong>${escapeHtml(fit.model)}</strong> on n=${escapeHtml(fit.n)} URLs (R²=${(fit.r2_chosen || 0).toFixed(3)})${sigmaStr}${bottom != null ? ` · bar to beat: <strong>${bottom.toFixed(2)}</strong>` : ''}</div>`
        : `<div class="subline" style="margin-top:4px">${bottom != null ? `bar to beat: <strong>${bottom.toFixed(2)}</strong>` : 'no OU fit (n &lt; 25 — used global formula)'}</div>`;
      const statusOptions = ['new', 'recovered', 'skipped', 'unreachable'];
      // Stamp each reject's outbound link with a hash fragment carrying the
      // originating dish + run timestamp (#_bcc_dish=…&_bcc_run=…). The
      // bookmarklet, running on the source page in the user's session,
      // reads location.hash to harvest these hints. They thread through
      // /stage-markdown → form hydrate → save, where the save forces
      // user_id=0 and stamps _master so the rescued recipe is attributed
      // back to the batch that originally rejected it. Hash (not query)
      // because it survives redirects + doesn't go to the source server.
      const dishHint = encodeURIComponent(payload.dish || '');
      const rows = rejects.map((r) => {
        const wouldQualify = (typeof r.ou === 'number' && bottom != null && r.ou > bottom);
        const ouStr = (typeof r.ou === 'number') ? r.ou.toFixed(2) : '—';
        const daStr = (typeof r.da === 'number') ? r.da.toFixed(0) : '—';
        const paStr = (typeof r.pa === 'number') ? r.pa.toFixed(0) : '—';
        const title = r.title || '(no title)';
        const hostname = (() => {
          try { return new URL(r.url).hostname.replace(/^www\./, ''); }
          catch { return r.url; }
        })();
        const status = r.status || 'new';
        const qualifyBadge = wouldQualify
          ? '<span class="qualify-badge">would qualify</span>'
          : '';
        const statusOpts = statusOptions.map(s =>
          `<option value="${s}" ${s === status ? 'selected' : ''}>${s}</option>`
        ).join('');
        const markedHint = (status !== 'new' && r.marked_at)
          ? `<span class="reject-marked">marked ${escapeHtml(fmtDate(r.marked_at))}</span>`
          : '';
        const runHint = encodeURIComponent(r.run_started_at || '');
        const stampedHref = `${r.url}${r.url.includes('#') ? '&' : '#'}_bcc_dish=${dishHint}&_bcc_run=${runHint}`;
        // Exceptionalism — what grade this URL WOULD HAVE earned if it'd
        // survived to master. Inline next to the existing DA/PA/OU
        // scores. Shows when the run computed one (n>=25 cohort).
        const excBadgeHtml = (r.exc_grade && r.exc_score != null
                              && window.LibraryShell && LibraryShell.renderExcBadge)
          ? LibraryShell.renderExcBadge(
              { grade: r.exc_grade, score: r.exc_score, basis: {} },
              { size: 'small' }
            )
          : '';
        return (
          `<div class="reject-row status-${escapeHtml(status)}" data-reject-id="${escapeHtml(r.id)}">` +
            `<div class="reject-row-main">` +
              `<a class="reject-title" href="${escapeHtml(stampedHref)}" target="_blank" rel="noopener noreferrer" title="${escapeHtml(r.url)}">${escapeHtml(title)}</a>` +
              ` <span class="reject-host">${escapeHtml(hostname)}</span>` +
              qualifyBadge +
              (excBadgeHtml ? ' ' + excBadgeHtml : '') +
            `</div>` +
            `<div class="reject-meta">` +
              `<span class="reject-reason">${escapeHtml(r.reason || '')}</span>` +
              `<span class="reject-scores">DA ${daStr} · PA ${paStr} · OU ${ouStr}</span>` +
            `</div>` +
            `<div class="reject-controls">` +
              `<label class="reject-status-label">Status` +
                `<select class="reject-status">${statusOpts}</select>` +
              `</label>` +
              `<input type="text" class="reject-notes" placeholder="Notes (optional)" value="${escapeHtml(r.notes || '')}" />` +
              markedHint +
            `</div>` +
          `</div>`
        );
      }).join('');
      // Empty-state copy: a clean run is GOOD news, not missing data.
      const listBlock = rejects.length === 0
        ? `<div class="subline" style="margin-top:10px;font-style:italic;color:var(--muted,#74695f)">` +
            `No rejects from the last run — every top-${rejects.length || 'N'} URL extracted and saved cleanly.` +
          `</div>`
        : `<div class="rejects-list" style="margin-top:10px">${rows}</div>` +
          `<div class="subline" style="margin-top:8px;font-style:italic">` +
            `Click a title to open in a new tab. Use the bookmarklet there to extract from your authenticated session, then save to master (your role allows it). ` +
            `Mark each reject's status — your marks persist across refreshes so already-decided URLs don't re-surface as fresh.` +
          `</div>`;
      const heading = rejects.length === 0
        ? `<strong>Last run summary</strong>`
        : `<strong>Rejected URLs (${rejects.length})</strong>`;
      return (
        `<details open class="rejects-details">` +
          `<summary>${heading}</summary>` +
          fitLine +
          listBlock +
        `</details>`
      );
    }

    // Attach status + notes change handlers to every reject row in
    // the panel. Called after renderRejects() injects HTML; uses
    // event delegation on the rejects-list container so we wire once
    // per render. Save fires on every change to the dropdown +
    // on blur of the notes input (cheap enough to commit every edit).
    function wireRejectControls(dishName) {
      const list = document.querySelector('#rejectsSection .rejects-list');
      if (!list) return;
      async function patchStatus(row, body) {
        const id = row.dataset.rejectId;
        if (!id) return;
        try {
          const res = await fetch(`${API}/dishes/${encodeURIComponent(dishName)}/rejects/${encodeURIComponent(id)}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          });
          if (!res.ok) {
            const txt = await res.text();
            setFeedback(`Reject update failed: ${txt.slice(0, 160)}`, 'error');
            return;
          }
          const updated = await res.json();
          // Reflect new status class + marked-at timestamp.
          row.className = `reject-row status-${updated.status || 'new'}`;
          let markedSpan = row.querySelector('.reject-marked');
          if ((updated.status || 'new') !== 'new' && updated.marked_at) {
            if (!markedSpan) {
              markedSpan = document.createElement('span');
              markedSpan.className = 'reject-marked';
              row.querySelector('.reject-controls').appendChild(markedSpan);
            }
            markedSpan.textContent = `marked ${fmtDate(updated.marked_at)}`;
          } else if (markedSpan) {
            markedSpan.remove();
          }
        } catch (err) {
          setFeedback(`Reject update failed: ${err.message || err}`, 'error');
        }
      }
      list.addEventListener('change', (e) => {
        if (!e.target.matches('.reject-status')) return;
        const row = e.target.closest('.reject-row');
        const notes = (row.querySelector('.reject-notes')?.value || '').trim();
        patchStatus(row, { status: e.target.value, notes });
      });
      list.addEventListener('blur', (e) => {
        if (!e.target.matches('.reject-notes')) return;
        const row = e.target.closest('.reject-row');
        const status = row.querySelector('.reject-status').value;
        patchStatus(row, { status, notes: e.target.value.trim() });
      }, true);
    }

    function renderEditForm(d) {
      const queries = Array.isArray(d.queries) ? d.queries : [];
      $('#detailPanel').innerHTML =
        `<div class="detail-card">` +
          `<h2>Edit ${escapeHtml(d.name)}</h2>` +
          `<div class="subline">name is immutable — to rename, delete + recreate</div>` +
          `<div class="field full"><label>Queries (one per line)</label>` +
            `<textarea id="ed_queries">${escapeHtml(queries.join('\n'))}</textarea>` +
          `</div>` +
          `<div class="field-row" style="margin-top:14px">` +
            `<div class="field"><label>Top-N SerpAPI / query</label>` +
              `<input type="number" id="ed_top_n_serpapi" min="1" value="${escapeHtml(d.top_n_serpapi)}" /></div>` +
            `<div class="field"><label>Top-N final</label>` +
              `<input type="number" id="ed_top_n_final" min="1" value="${escapeHtml(d.top_n_final)}" /></div>` +
            `<div class="field"><label>Refresh TTL (days)</label>` +
              `<input type="number" id="ed_ttl" min="1" value="${d.refresh_ttl_days == null ? '' : escapeHtml(d.refresh_ttl_days)}" placeholder="blank = manual only" /></div>` +
          `</div>` +
          `<div class="field full" style="margin-top:14px">` +
            `<label>Description <span class="hint">(used for cohort matching — auto-generated if blank, curator can edit)</span></label>` +
            `<textarea id="ed_description" rows="3" style="resize:vertical">${escapeHtml(d.description || '')}</textarea>` +
          `</div>` +
          `<div class="field full" style="margin-top:14px">` +
            `<label>Notes</label>` +
            `<input type="text" id="ed_notes" value="${escapeHtml(d.notes || '')}" />` +
          `</div>` +
          `<div class="field full" style="margin-top:14px">` +
            `<label style="display:flex;align-items:center;gap:8px;cursor:pointer">` +
              `<input type="checkbox" id="ed_auto_enrich" ${d.auto_enrich ? 'checked' : ''} style="width:auto;margin:0" />` +
              `Auto-enrich on save` +
            `</label>` +
            `<span class="hint">Default off. When on, each master row saved during a refresh runs through enrich_recipe (~$0.05 + ~10s per row, adds ~4 minutes per 25-URL refresh).</span>` +
          `</div>` +

      $('#footerButtons').innerHTML =
        `<button type="button" class="primary" id="saveBtn">Save</button>` +
        `<button type="button" class="secondary" id="cancelBtn">Cancel</button>` +
        `<div class="feedback" id="feedback"></div>`;
      $('#actionFooter').style.display = '';
      $('#saveBtn').addEventListener('click', () => doSaveEdit(d));
      $('#cancelBtn').addEventListener('click', () => { mode = 'view'; renderDetail(); });

    function renderAddForm() {
      // Defaults are conveyed via placeholder text (italic grey hint),
      // NOT via value="..." — otherwise the defaults look like a real
      // half-filled entry and the user wonders if the form was cleared.
      // doCreate's `parseInt(...) || N` fallback supplies the actual
      // default when the field is left blank.
      $('#detailPanel').innerHTML =
        `<div class="detail-card">` +
          `<h2>Add a new dish</h2>` +
          `<div class="subline">name is immutable after creation — join key into master_recipes</div>` +
          `<div class="field full"><label>Dish name *</label>` +
            `<input type="text" id="ad_name" placeholder="e.g. Spaghetti and Meat Sauce" /></div>` +
          `<div class="field full" style="margin-top:14px">` +
            `<label>Queries (one per line) *</label>` +
            `<textarea id="ad_queries" placeholder="spaghetti with meat sauce&#10;spaghetti and meat sauce"></textarea>` +
            `<span class="hint">Multiple lines union for one dish.</span>` +
          `</div>` +
          `<div class="field-row" style="margin-top:14px">` +
            `<div class="field"><label>Top-N SerpAPI / query</label>` +
              `<input type="number" id="ad_top_n_serpapi" min="1" placeholder="25 (default)" /></div>` +
            `<div class="field"><label>Top-N final</label>` +
              `<input type="number" id="ad_top_n_final" min="1" placeholder="10 (default)" /></div>` +
            `<div class="field"><label>Refresh TTL (days)</label>` +
              `<input type="number" id="ad_ttl" min="1" placeholder="30 (default) — blank = manual only" /></div>` +
          `</div>` +
          `<div class="field full" style="margin-top:14px">` +
            `<label>Description (optional)</label>` +
            `<textarea id="ad_description" rows="3" style="resize:vertical" placeholder="auto-generated if left blank — used for cohort matching"></textarea>` +
            `<span class="hint">A one-line dish identity for the embedding matcher. Leave blank and the system will draft one; you can edit later.</span>` +
          `</div>` +
          `<div class="field full" style="margin-top:14px">` +
            `<label>Notes (optional)</label>` +
            `<input type="text" id="ad_notes" placeholder="curator note" />` +
          `</div>` +
          `<div class="field full" style="margin-top:14px">` +
            `<label style="display:flex;align-items:center;gap:8px;cursor:pointer">` +
              `<input type="checkbox" id="ad_auto_enrich" style="width:auto;margin:0" />` +
              `Auto-enrich on save` +
            `</label>` +
            `<span class="hint">Default off. When on, each master row saved during a refresh runs through enrich_recipe (~$0.05 + ~10s per row, adds ~4 minutes per 25-URL refresh).</span>` +
          `</div>` +
        `</div>`;
      $('#footerButtons').innerHTML =
        `<button type="button" class="primary" id="createBtn">Create dish</button>` +
        `<button type="button" class="secondary" id="cancelAddBtn">Cancel</button>` +
        `<div class="feedback" id="feedback"></div>`;
      $('#actionFooter').style.display = '';
      // If the user got here by clicking a suggestion, pre-fill
      // the form. SerpAPI handles phrasing variants, so a single
      // canonical query is usually enough; we still let the curator
      // edit before save. setTimeout: wait for innerHTML to settle.
      if (pendingSuggestion) {
        const sug = pendingSuggestion;
        setTimeout(() => {
          const nm = $('#ad_name'); if (nm) nm.value = sug.suggested || '';
          const qs = $('#ad_queries'); if (qs) qs.value = sug.suggested || '';
          // Note in the feedback area what's pre-filled from
          setFeedback(`Pre-filled from ${sug.waiting} recipes calling this their dish. Review and Create.`, 'info');
        }, 30);
      }
      $('#createBtn').addEventListener('click', doCreate);
      $('#cancelAddBtn').addEventListener('click', () => {
        pendingSuggestion = null;
        mode = selectedName ? 'view' : 'empty';
        renderDetail();
      });
      setTimeout(() => $('#ad_name')?.focus(), 50);
    }

    function setFeedback(msg, kind = 'info') {
      const el = $('#feedback');
      if (!el) return;
      el.textContent = msg || '';
      el.className = 'feedback ' + (kind || '');
    }

    // ===== Actions =====
    async function doCreate() {
      const name = $('#ad_name').value.trim();
      const queries = $('#ad_queries').value.split('\n').map(q => q.trim()).filter(Boolean);
      const ttlRaw = $('#ad_ttl').value.trim();
      const body = {
        name,
        queries,
        top_n_serpapi: parseInt($('#ad_top_n_serpapi').value, 10) || 25,
        top_n_final:   parseInt($('#ad_top_n_final').value, 10)   || 10,
        refresh_ttl_days: ttlRaw === '' ? null : parseInt(ttlRaw, 10),
        notes: $('#ad_notes').value.trim() || null,
        auto_enrich: $('#ad_auto_enrich').checked,
        description: $('#ad_description').value.trim() || null,
      };
      try {
        const res = await fetch(`${API}/dishes`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const result = await res.json().catch(() => ({}));
        if (!res.ok) {
          setFeedback((typeof result.detail === 'string' ? result.detail : JSON.stringify(result.detail)) || `HTTP ${res.status}`, 'error');
          return;
        }
        dishes[result.name] = result;
        // Post-save UX (2026-05-29): return to the list-active state
        // rather than staying on the detail card. Selection is cleared
        // so no row is highlighted; the user lands looking at the list
        // and decides what to do next (click the just-created dish, or
        // something else). Same pattern as the recipe form's post-save.
        selectedName = null;
        mode = 'empty';
        pendingSuggestion = null;
        renderList();
        renderDetail();
        loadSuggestions();
        LibraryShell && LibraryShell.openSidebar && LibraryShell.openSidebar();
        setFeedback(`Created ${result.name} — pick a dish or add another.`, 'success');
      } catch (err) {
        setFeedback(err.message || String(err), 'error');
      }
    }

    async function doSaveEdit(d) {
      const ttlRaw = $('#ed_ttl').value.trim();
      const body = {
        queries: $('#ed_queries').value.split('\n').map(q => q.trim()).filter(Boolean),
        top_n_serpapi: parseInt($('#ed_top_n_serpapi').value, 10),
        top_n_final:   parseInt($('#ed_top_n_final').value, 10),
        refresh_ttl_days: ttlRaw === '' ? null : parseInt(ttlRaw, 10),
        notes: $('#ed_notes').value.trim() || null,
        auto_enrich: $('#ed_auto_enrich').checked,
        description: $('#ed_description').value.trim() || null,
      };
      try {
        const res = await fetch(`${API}/dishes/${encodeURIComponent(d.name)}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const result = await res.json().catch(() => ({}));
        if (!res.ok) {
          setFeedback((typeof result.detail === 'string' ? result.detail : JSON.stringify(result.detail)) || `HTTP ${res.status}`, 'error');
          return;
        }
        dishes[result.name] = result;
        // Post-edit-save UX: return to list-active state (consistent
        // with doCreate above + the recipe form's post-save behavior).
        selectedName = null;
        mode = 'empty';
        renderList();
        renderDetail();
        LibraryShell && LibraryShell.openSidebar && LibraryShell.openSidebar();
        setFeedback('Saved.', 'success');
      } catch (err) {
        setFeedback(err.message || String(err), 'error');
      }
    }

    async function doDelete(d) {
      if (!confirm(
        `Delete dish "${d.name}"?\n\n` +
        `This ALSO deletes every top-kind master_recipes row for this dish ` +
        `(editors_choice and legacy rows untouched). Cannot be undone.`
      )) return;
      try {
        const res = await fetch(`${API}/dishes/${encodeURIComponent(d.name)}`, { method: 'DELETE' });
        const result = await res.json().catch(() => ({}));
        if (!res.ok) {
          setFeedback((typeof result.detail === 'string' ? result.detail : JSON.stringify(result.detail)) || `HTTP ${res.status}`, 'error');
          return;
        }
        delete dishes[d.name];
        selectedName = null;
        mode = 'empty';
        renderList();
        renderDetail();
      } catch (err) {
        setFeedback(err.message || String(err), 'error');
      }
    }

    // Run a dish refresh. Three phases:
    //   1. POST /dishes/<name>/refresh — returns 202 with {job_id} immediately
    //      (no Cloudflare 100s timeout). On 409 (job already in flight) we
    //      attach to that job's stream instead of failing.
    //   2. Open SSE stream at /jobs/<id>/stream — receive live log lines,
    //      status changes, heartbeats. The browser sees the run as a
    //      growing log panel + a status pill changing 'queued' → 'running'
    //      → 'success'/'error'.
    //   3. On `done` event — close the stream, refetch the dish (so its
    //      last_refreshed/last_run_count are fresh), render the view + a
    //      summary panel.
    async function doRun(d) {
      const buttons = $('#footerButtons').querySelectorAll('button');
      buttons.forEach(b => b.disabled = true);
      setFeedback('Enqueuing job…', 'info');

      let job_id = null;
      try {
        const res = await fetch(`${API}/dishes/${encodeURIComponent(d.name)}/refresh`, { method: 'POST' });
        const result = await res.json().catch(() => ({}));
        if (res.status === 202) {
          job_id = result.job_id;
        } else if (res.status === 409 && result.job_id) {
          // Already in flight (the page was opened while a prior run was
          // still running, OR another browser tab kicked one off).
          // Attach to the existing job's stream rather than failing.
          job_id = result.job_id;
          setFeedback(`Attaching to in-flight job #${job_id}…`, 'info');
        } else {
          setFeedback(`Run failed: ${(typeof result.detail === 'string' ? result.detail : JSON.stringify(result)) || res.status}`, 'error');
          buttons.forEach(b => b.disabled = false);
          return;
        }
      } catch (err) {
        setFeedback(`Enqueue failed: ${err.message || err}`, 'error');
        buttons.forEach(b => b.disabled = false);
        return;
      }

      // Build / reveal the live-log panel
      const liveLog = ensureLiveLogPanel(job_id);
      setFeedback(`Job #${job_id} queued`, 'info');

      // Connect to the SSE stream
      const stream = new EventSource(`${API}/jobs/${job_id}/stream`);

      stream.addEventListener('status', (e) => {
        try {
          const data = JSON.parse(e.data);
          liveLog.statusEl.textContent = data.status;
          liveLog.statusEl.className = 'live-log-status ' + data.status;
          if (data.status === 'running') setFeedback(`Job #${job_id} running…`, 'info');
        } catch (err) { /* ignore parse errors */ }
      });

      stream.addEventListener('log', (e) => {
        try {
          const data = JSON.parse(e.data);
          appendLiveLogLine(liveLog, data.line);
        } catch (err) { /* ignore */ }
      });

      stream.addEventListener('heartbeat', () => {
        // Visual ping — could update a timestamp; for now no-op.
      });

      stream.addEventListener('done', async (e) => {
        let data = {};
        try { data = JSON.parse(e.data); } catch (err) {}
        stream.close();
        // Refetch dish row + result panel from the completed job.
        try {
          const dishRes = await fetch(`${API}/dishes/${encodeURIComponent(d.name)}`);
          if (dishRes.ok) {
            const fresh = await dishRes.json();
            dishes[fresh.name] = fresh;
            mode = 'view';
            renderList();
            renderDetail();
            // Re-attach the live log to the new view card so the user
            // can still see the trace + then append the result panel.
            const refreshedLive = ensureLiveLogPanel(job_id);
            // Restore the lines we already streamed (renderDetail wiped them)
            refreshedLive.bodyEl.innerHTML = liveLog.bodyEl.innerHTML;
            refreshedLive.statusEl.textContent = data.status || 'done';
            refreshedLive.statusEl.className = 'live-log-status ' + (data.status || 'done');
            if (data.result) appendResultPanel(data.result);
            if (data.error_detail) appendErrorPanel(data.error_detail);
          }
        } catch (err) {
          console.error('post-run reload failed:', err);
        }
        const ok = data.status === 'success';
        setFeedback(
          ok ? `Job #${job_id} success` :
          (data.error_detail ? `Job #${job_id} ${data.status}: ${data.error_detail}` :
           `Job #${job_id} ${data.status}`),
          ok ? 'success' : 'error'
        );
      });

      stream.addEventListener('error', (e) => {
        // SSE errored. Cloudflare or network glitch. EventSource will
        // auto-reconnect; if the job already finished, the server
        // returns the final 'done' status on reconnect. Show a hint.
        setFeedback(`Stream interrupted — auto-reconnecting…`, 'error');
      });
    }

    // Live log panel: a console-style growing div pinned under the dish
    // header that shows lines as they stream in from the SSE 'log' event.
    function ensureLiveLogPanel(job_id) {
      let panel = document.getElementById('liveLog');
      if (panel) return {
        statusEl: panel.querySelector('.live-log-status'),
        bodyEl: panel.querySelector('.live-log-body'),
      };
      const detail = document.getElementById('detailCard');
      if (!detail) return { statusEl: { textContent: '', className: '' }, bodyEl: { appendChild() {}, innerHTML: '' } };
      panel = document.createElement('div');
      panel.id = 'liveLog';
      panel.className = 'live-log';
      panel.innerHTML =
        `<div class="live-log-header">` +
          `<strong>Job #${job_id}</strong>` +
          `<span class="live-log-status queued">queued</span>` +
          `<a href="/jobs/${job_id}" target="_blank" rel="noopener" style="color:var(--muted);font-size:0.82em;margin-left:auto">status JSON →</a>` +
        `</div>` +
        `<pre class="live-log-body"></pre>`;
      detail.appendChild(panel);
      return {
        statusEl: panel.querySelector('.live-log-status'),
        bodyEl: panel.querySelector('.live-log-body'),
      };
    }

    function appendLiveLogLine(liveLog, line) {
      // Append + auto-scroll. Keep last ~2000 lines so a runaway log
      // doesn't blow up the DOM.
      const div = document.createElement('div');
      div.textContent = line;
      liveLog.bodyEl.appendChild(div);
      const MAX_LINES = 2000;
      while (liveLog.bodyEl.children.length > MAX_LINES) {
        liveLog.bodyEl.removeChild(liveLog.bodyEl.firstChild);
      }
      liveLog.bodyEl.scrollTop = liveLog.bodyEl.scrollHeight;
    }

    function appendErrorPanel(error_detail) {
      const detail = document.getElementById('detailCard');
      if (!detail) return;
      const panel = document.createElement('div');
      panel.className = 'run-result';
      panel.style.background = '#fce8e8';
      panel.style.borderColor = '#f0b6b6';
      panel.innerHTML = `<div class="row"><strong>Job errored:</strong> ${escapeHtml(error_detail)}</div>`;
      detail.appendChild(panel);
    }

    function appendResultPanel(result) {
      const detail = document.getElementById('detailCard');
      if (!detail) return;
      const panel = document.createElement('div');
      panel.className = 'run-result';
      const c = result.front_end_counts || {};
      panel.innerHTML =
        `<div class="row"><strong>Run complete</strong> in ${Math.round(result.elapsed_s || 0)}s — ` +
        `<span class="value">${escapeHtml(result.saved_count)} saved</span>, ` +
        `<span class="value">${escapeHtml(result.skipped_thin)} skipped (thin)</span>, ` +
        `<span class="value">${(result.extract_misses || []).length} extract miss</span>, ` +
        `<span class="value">${escapeHtml(result.deleted_prior_rows)} prior rows deleted</span></div>` +
        `<details><summary>Front-end stage counts</summary>` +
          `<div style="margin-top:4px;font-family:ui-monospace,monospace;font-size:0.82em">` +
            `<span class="label">SerpAPI/query:</span> ${escapeHtml(c.serpapi_per_query)} × ${escapeHtml(c.num_queries ?? 1)} queries · ` +
            `<span class="label">serpapi_union:</span> ${escapeHtml(c.serpapi_union)} · ` +
            `<span class="label">after_disallowed:</span> ${escapeHtml(c.after_disallowed)} · ` +
            `<span class="label">after_is_recipe:</span> ${escapeHtml(c.after_is_recipe)} · ` +
            `<span class="label">after_moz:</span> ${escapeHtml(c.after_moz)} · ` +
            `<span class="label">after_min_da:</span> ${escapeHtml(c.after_min_da)} · ` +
            `<span class="label">after_min_ou:</span> ${escapeHtml(c.after_min_ou)} · ` +
            `<span class="label">final:</span> ${escapeHtml(c.final)}` +
          `</div></details>` +
        ((result.extract_misses || []).length
          ? `<details><summary>Extract misses (${(result.extract_misses || []).length})</summary>` +
            `<ul class="url-list">` + result.extract_misses.map(u => `<li>${escapeHtml(u)}</li>`).join('') + `</ul></details>`
          : '') +
        ((result.save_failures || []).length
          ? `<details><summary>Save failures (${(result.save_failures || []).length})</summary>` +
            `<ul class="url-list">` + result.save_failures.map(u => `<li>${escapeHtml(u)}</li>`).join('') + `</ul></details>`
          : '');
      detail.appendChild(panel);
    }

    // ===== Initial load =====
    async function loadDishes() {
      try {
        const res = await fetch(`${API}/dishes`);
        const arr = await res.json();
        dishes = {};
        for (const d of (arr || [])) dishes[d.name] = d;
        renderList();
        renderDetail();
        if (window.matchMedia('(min-width: 760px)').matches) LibraryShell.openSidebar();
      } catch (e) {
        $('#dishList').innerHTML = `<li class="empty-state">Failed to load: ${escapeHtml(e.message || e)}</li>`;
      }
    }

    // Pending suggestion to pre-fill the add form with. Set by
    // clicking a suggestion; read by renderAddForm to populate.
    let pendingSuggestion = null;

    async function loadSuggestions() {
      try {
        const res = await fetch(`${API}/dishes/suggestions`);
        if (!res.ok) return;
        const arr = await res.json();
        const section = $('#suggestionsSection');
        const list = $('#suggestionList');
        const count = $('#suggestionCount');
        if (!arr || !arr.length) {
          section.style.display = 'none';
          return;
        }
        count.textContent = `(${arr.length})`;
        list.innerHTML = '';
        for (const s of arr) {
          const chapters = (s.chapters || []).filter(Boolean).join(', ');
          const cuisines = (s.cuisines || []).filter(Boolean).join(', ');
          const li = document.createElement('li');
          li.innerHTML =
            `<div class="entity-name">${escapeHtml(s.suggested)} ` +
            `<span class="badge badge-due" style="background:#e6f4ea;color:#1e6b3a">${s.waiting} waiting</span>` +
            `</div>` +
            `<div class="entity-meta">${chapters ? escapeHtml(chapters) : '—'}` +
            (cuisines ? ` · ${escapeHtml(cuisines)}` : '') + `</div>`;
          li.style.cursor = 'pointer';
          li.title = `Pre-fill Add Dish form with "${s.suggested}"`;
          li.addEventListener('click', () => {
            pendingSuggestion = s;
            selectedName = null;
            mode = 'add';
            renderList();
            renderDetail();
            closeOnNarrow();
          });
          list.appendChild(li);
        }
        section.style.display = '';
      } catch (e) {
        // Silent — suggestions are non-critical.
        console.warn('suggestions load failed', e);
      }
    }

    loadDishes();
    loadSuggestions();
  </script>
</body>
