<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Best Cooks Club — Admin · Users</title>
  <!-- Users admin editor on the shared master/detail editor shell
       (editor-shell.css + LibraryShell.initEditorNav). Second clone of the
       a/c/d/v template — the editable-record case. See
       memory/project_admin_editor_nav.md. -->
  <link rel="stylesheet" href="/forms/editor-shell.css?v=20260531b">
  <style>
    /* page-specific bits (avatar, identity strip) — shell stays generic */
    .u-avatar{ width:24px; height:24px; border-radius:50%; background:var(--accent); color:#fff;
      display:flex; align-items:center; justify-content:center; font-size:.6em; font-weight:700;
      flex:0 0 auto; letter-spacing:.02em; }
    .u-avatar.gated{ background:#7a5e3a; }
    .u-avatar.lg{ width:46px; height:46px; font-size:1.05em; }
    .u-head{ display:flex; align-items:center; gap:14px; margin:0 0 12px; }
    .u-head .ed-title{ margin:0; }
    .ed-field .warn-hint{ color:var(--ed-warn); font-size:.78em; margin-top:5px; }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <button class="ed-back" id="edBack" aria-label="Toggle list"></button>
      <div class="ed-brand">Best Cooks Club</div>
    </div>
  </header>
  <div class="ed-scrim" id="edScrim"></div>

  <div class="ed-app">
    <aside class="ed-sidebar">
      <div class="ed-sidebar-head">
        <h2>Users <span class="ed-count" id="count"></span></h2>
        <div class="ed-head-actions">
          <button class="ed-icon-btn" id="searchToggle" title="Search &amp; sort" aria-label="Search and sort">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          </button>
          <button class="ed-icon-btn" id="addToggle" title="New user" aria-label="New user">
            <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
          </button>
        </div>
      </div>

      <div class="ed-attn" id="attn"><div class="ed-attn-title" id="attnTitle"></div><div class="ed-attn-copy" id="attnCopy"></div></div>

      <div class="ed-controls" id="controls" hidden>
        <input type="search" id="search" placeholder="Search name or email…">
        <select id="sort" aria-label="Sort users">
          <option value="attention">Sort: needs attention</option>
          <option value="name">Sort: name (A–Z)</option>
          <option value="role">Sort: role (staff first)</option>
          <option value="newest">Sort: newest</option>
        </select>
      </div>

      <div class="ed-legend">
        <span><i class="d ok"></i>staff</span>
        <span><i class="d none"></i>member</span>
        <span><i class="d warn"></i>incomplete</span>
      </div>

      <ul class="ed-list" id="list"><li class="ed-empty">Loading…</li></ul>
    </aside>

    <main class="ed-content"><div class="ed-page" id="page"></div></main>
  </div>

  <script src="/forms/library-shell.js?v=20260531a"></script>
  <script>
    const $ = (s) => document.querySelector(s);

    LibraryShell.initNav({ currentPage: 'users' });
    const nav = LibraryShell.initEditorNav({
      backButton: '#edBack', scrim: '#edScrim',
      listLabel: 'Users', listMode: 'docked', shellWidth: 1200,
    });
    const { escapeHtml, fmtDate, flash } = LibraryShell;

    const ROLES = ['owner', 'admin', 'editor', 'author', 'contributor', 'member'];
    const STATUSES = ['test', 'free', 'paid', 'comped'];
    const STAFF = new Set(['owner', 'admin', 'editor', 'author']);

    let users = {};               // keyed by user_id
    let selected = null;          // user_id | 0 (master) | '__new__'
    let term = '';
    let sortKey = 'attention';

    const isStaff = (u) => STAFF.has(u.role);
    const incomplete = (u) => !u.email;
    const needsAttention = (u) => incomplete(u);
    const flag = (u) => incomplete(u) ? 'warn' : (isStaff(u) ? 'ok' : 'none');
    function initials(name){
      const p = (name || '').trim().split(/\s+/);
      return ((p[0]?.[0] || '') + (p.length > 1 ? p[p.length - 1][0] : '')).toUpperCase() || '?';
    }

    function sortedUsers(){
      const t = term.toLowerCase();
      const rows = Object.values(users).filter(u =>
        !t || u.name.toLowerCase().includes(t) || (u.email || '').toLowerCase().includes(t));
      const sorters = {
        attention: (a, b) => (needsAttention(b) - needsAttention(a)) || a.name.localeCompare(b.name),
        name:    (a, b) => a.name.localeCompare(b.name),
        role:    (a, b) => (isStaff(b) - isStaff(a)) || ROLES.indexOf(a.role) - ROLES.indexOf(b.role) || a.name.localeCompare(b.name),
        newest:  (a, b) => String(b.created_at || '').localeCompare(String(a.created_at || '')),
      };
      return rows.sort(sorters[sortKey] || sorters.attention);
    }

    /* ----------------------------- list ----------------------------- */
    function renderList(){
      const rows = sortedUsers();
      $('#count').textContent = `(${rows.length})`;

      const attn = Object.values(users).filter(needsAttention).length;
      const panel = $('#attn'), title = $('#attnTitle'), copy = $('#attnCopy');
      if (attn){ panel.classList.remove('none'); title.textContent = `${attn} incomplete`; copy.textContent = 'Missing email — can’t be contacted or linked to a Ghost member.'; }
      else { panel.classList.add('none'); title.textContent = 'All profiles complete'; copy.textContent = 'Every user has an email on file.'; }

      const ul = $('#list'); ul.innerHTML = '';

      // Pinned, read-only Master sentinel (#0) — not in the users table.
      const m = document.createElement('li');
      m.className = 'ed-item' + (selected === 0 ? ' selected' : '');
      m.style.marginBottom = '10px';
      m.innerHTML = `<div class="ed-item-top"><span class="u-avatar gated">M</span><span class="ed-item-name">Master (curator collection)</span></div><div class="ed-item-meta" style="margin-left:33px;color:var(--accent)">#0 · role-gated</div>`;
      m.addEventListener('click', () => { selected = 0; renderList(); renderMain(); nav.afterSelect(); });
      ul.appendChild(m);

      if (!rows.length){ ul.insertAdjacentHTML('beforeend', '<li class="ed-empty">No matches</li>'); return; }
      for (const u of rows){
        const li = document.createElement('li');
        li.className = 'ed-item' + (u.user_id === selected ? ' selected' : '');
        li.innerHTML =
          `<div class="ed-item-top"><span class="u-avatar">${escapeHtml(initials(u.name))}</span>` +
          `<span class="ed-item-name">${escapeHtml(u.name)}</span><span class="ed-item-flag ${flag(u)}"></span></div>` +
          `<div class="ed-item-meta" style="margin-left:33px">#${u.user_id} · ${escapeHtml(u.email || '(no email)')} · ${escapeHtml(u.role)}</div>`;
        li.addEventListener('click', () => { selected = u.user_id; renderList(); renderMain(); nav.afterSelect(); });
        ul.appendChild(li);
      }
    }

    /* ----------------------------- dispatch ----------------------------- */
    function user(){ return users[selected]; }
    function renderMain(){
      if (selected === '__new__') return renderCreate();
      if (selected === 0) return renderMaster();
      const u = user();
      if (!u){ const first = sortedUsers()[0]; selected = first ? first.user_id : 0; return renderMain(); }
      renderDetail(u);
    }

    function stripPills(u){
      const out = [];
      out.push(`<span class="ed-pill ${isStaff(u) ? 'ok' : ''}"><i class="d"></i>${escapeHtml(u.role)}</span>`);
      out.push(`<span class="ed-pill ${u.status === 'paid' ? 'good' : ''}"><i class="d"></i>${escapeHtml(u.status || 'test')}${u.subscription_tier ? ' · ' + escapeHtml(u.subscription_tier) : ''}</span>`);
      if (incomplete(u)) out.push(`<span class="ed-pill warn"><i class="d"></i>No email</span>`);
      return out.join('');
    }

    function renderDetail(u){
      $('#page').innerHTML = `
        <div class="ed-kicker">
          <button type="button" class="ed-purpose-toggle" id="purposeToggle">Admin · Edit User <span id="purposeArrow">▾</span></button>
          <div class="ed-purpose-pop" id="purposePop" hidden>
            <strong>Purpose:</strong> edit a user’s identity, role and billing status, log in as them for testing, or remove them. When Ghost is wired in, identity/role sync from the member session and most of this becomes read-only.
          </div>
        </div>

        <div class="u-head">
          <span class="u-avatar lg">${escapeHtml(initials(u.name))}</span>
          <h1 class="ed-title" id="detailTitle">${escapeHtml(u.name || '(no name)')}</h1>
        </div>
        <div class="ed-status-strip" id="statusStrip">${stripPills(u)}</div>
        <p class="ed-submeta">user #${u.user_id} · joined ${fmtDate(u.created_at)} · updated ${fmtDate(u.updated_at)}</p>

        <section class="ed-block">
          <h3 class="ed-block-label">Identity</h3>
          <div class="ed-form-grid">
            <div class="ed-field"><label for="f_name">Name</label><input id="f_name" type="text" value="${escapeHtml(u.name || '')}"></div>
            <div class="ed-field"><label for="f_email">Email</label><input id="f_email" type="email" value="${escapeHtml(u.email || '')}" placeholder="name@example.com">
              ${incomplete(u) ? '<div class="warn-hint">No email on file — flagged incomplete.</div>' : ''}</div>
          </div>
        </section>

        <section class="ed-block">
          <h3 class="ed-block-label">Access &amp; billing</h3>
          <div class="ed-form-grid">
            <div class="ed-field"><label for="f_role">Role</label><select id="f_role">${ROLES.map(r => `<option ${r === u.role ? 'selected' : ''}>${r}</option>`).join('')}</select></div>
            <div class="ed-field"><label for="f_status">Account status</label><select id="f_status">${STATUSES.map(s => `<option ${s === (u.status || 'test') ? 'selected' : ''}>${s}</option>`).join('')}</select></div>
            <div class="ed-field full"><label for="f_tier">Subscription tier</label><input id="f_tier" type="text" value="${escapeHtml(u.subscription_tier || '')}" placeholder="e.g. Pro, Basic, Admin (optional)"></div>
          </div>
        </section>

        <section class="ed-block">
          <h3 class="ed-block-label">Activity</h3>
          <div class="ed-kv">
            <div class="k">User ID</div><div class="v">#${u.user_id}</div>
            <div class="k">Joined</div><div class="v">${fmtDate(u.created_at)}</div>
            <div class="k">Last updated</div><div class="v">${fmtDate(u.updated_at)}</div>
            <div class="k">Ghost member</div><div class="v">${u.ghost_uuid ? 'linked' : 'not linked'}</div>
          </div>
        </section>

        <div class="ed-actions">
          <button type="button" class="ed-btn primary" id="saveBtn">Save changes</button>
          <button type="button" class="ed-btn" id="loginBtn">Log in as user</button>
          <button type="button" class="ed-btn danger" id="deleteBtn">Delete user</button>
          <span class="ed-save-hint" id="hint"></span>
        </div>`;

      $('#purposeToggle').addEventListener('click', () => {
        const p = $('#purposePop'), a = $('#purposeArrow');
        p.hidden = !p.hidden; a.textContent = p.hidden ? '▾' : '▴';
      });
      $('#saveBtn').addEventListener('click', () => doSave(u));
      $('#loginBtn').addEventListener('click', () => login(u.user_id));
      $('#deleteBtn').addEventListener('click', () => doDelete(u));
    }

    function login(uid){
      // The user switcher: set identity + current view, open the recipe form
      // as that user (same behaviour as the old picker's pickUser).
      try {
        localStorage.setItem('app:self_user_id', String(uid));
        localStorage.setItem('sidebar:user_id', String(uid));
      } catch (e) { /* private mode */ }
      window.location.href = '/forms/recipe_form_styled.html';
    }

    async function doSave(u){
      const hint = $('#hint'); const btn = $('#saveBtn');
      const name = $('#f_name').value.trim();
      const email = $('#f_email').value.trim();
      if (!name){ hint.style.color = 'var(--ed-warn)'; hint.textContent = 'Name is required'; $('#f_name').focus(); return; }
      if (email && !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){ hint.style.color = 'var(--ed-warn)'; hint.textContent = 'Enter a valid email'; $('#f_email').focus(); return; }
      const body = { name, email, role: $('#f_role').value, status: $('#f_status').value, subscription_tier: $('#f_tier').value.trim() };
      hint.style.color = ''; btn.disabled = true; btn.textContent = 'Saving…'; btn.classList.remove('done');
      try {
        const r = await fetch(`/users/${u.user_id}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
        const data = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(data.detail || `HTTP ${r.status}`);
        users[u.user_id] = data;                       // adopt server's canonical row
        // Update title/pills/avatar in place — no destructive re-render.
        $('#detailTitle').textContent = data.name;
        $('#statusStrip').innerHTML = stripPills(data);
        document.querySelector('.u-head .u-avatar').textContent = initials(data.name);
        renderList();
        btn.textContent = 'Saved ✓'; btn.classList.add('done'); hint.textContent = 'Saved';
        setTimeout(() => { btn.textContent = 'Save changes'; btn.classList.remove('done'); btn.disabled = false; }, 1900);
      } catch (e) {
        btn.disabled = false; btn.textContent = 'Save changes';
        hint.style.color = 'var(--ed-warn)'; hint.textContent = String(e.message || e);
      }
    }

    async function doDelete(u){
      if (!confirm(`Delete user “${u.name || '(no name)'}” (#${u.user_id})?`)) return;
      try {
        const r = await fetch(`/users/${u.user_id}`, { method: 'DELETE' });
        const data = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(data.detail || `HTTP ${r.status}`);
        delete users[u.user_id];
        const first = sortedUsers()[0];
        selected = first ? first.user_id : 0;
        renderList(); renderMain();
        flash('User deleted');
      } catch (e) {
        // 409 = user still owns recipes (server refuses) — surface it clearly.
        flash(String(e.message || e), true);
      }
    }

    function renderMaster(){
      $('#page').innerHTML = `
        <div class="ed-kicker"><button type="button" class="ed-purpose-toggle" disabled style="cursor:default">Admin · Master Collection</button></div>
        <div class="u-head"><span class="u-avatar lg gated">M</span><h1 class="ed-title">Master (curator collection)</h1></div>
        <div class="ed-status-strip"><span class="ed-pill ok"><i class="d"></i>role-gated</span><span class="ed-pill"><i class="d"></i>user #0 · sentinel</span></div>
        <p class="ed-submeta">Not a real user — the dispatch target for the curated master collection.</p>
        <section class="ed-block">
          <h3 class="ed-block-label">Access</h3>
          <div class="ed-callout info"><span class="mark">○</span><span>There’s no “Master” account to log in as. Anyone with <strong>owner / admin / editor / author</strong> can save to the master collection from the recipe form — access is role-gated, not a separate identity. (user_id 0 is reserved and not editable here.)</span></div>
        </section>`;
    }

    function renderCreate(){
      $('#page').innerHTML = `
        <div class="ed-kicker"><button type="button" class="ed-purpose-toggle" disabled style="cursor:default">Admin · New User</button></div>
        <h1 class="ed-title" style="margin:0 0 18px">Add a user</h1>
        <section class="ed-block" style="border-top:none;padding-top:0">
          <div class="ed-form-grid">
            <div class="ed-field"><label for="n_name">Name</label><input id="n_name" type="text" placeholder="Required" autocomplete="off"></div>
            <div class="ed-field"><label for="n_email">Email</label><input id="n_email" type="email" placeholder="name@example.com (optional)" autocomplete="off"></div>
            <div class="ed-field"><label for="n_role">Role</label><select id="n_role">${ROLES.map(r => `<option ${r === 'member' ? 'selected' : ''}>${r}</option>`).join('')}</select></div>
            <div class="ed-field"><label for="n_status">Account status</label><select id="n_status">${STATUSES.map(s => `<option ${s === 'test' ? 'selected' : ''}>${s}</option>`).join('')}</select></div>
            <div class="ed-field full"><label for="n_tier">Subscription tier</label><input id="n_tier" type="text" placeholder="optional"></div>
          </div>
        </section>
        <div class="ed-actions" style="position:static;background:none;padding:8px 0 0">
          <button type="button" class="ed-btn primary" id="createBtn">Create user</button>
          <button type="button" class="ed-btn" id="cancelBtn">Cancel</button>
          <span class="ed-save-hint" id="hint"></span>
        </div>`;
      $('#n_name').focus();
      $('#cancelBtn').addEventListener('click', () => { const first = sortedUsers()[0]; selected = first ? first.user_id : 0; renderList(); renderMain(); });
      $('#createBtn').addEventListener('click', doCreate);
    }

    async function doCreate(){
      const hint = $('#hint'); const btn = $('#createBtn');
      const name = $('#n_name').value.trim();
      const email = $('#n_email').value.trim();
      if (!name){ hint.style.color = 'var(--ed-warn)'; hint.textContent = 'Name is required'; $('#n_name').focus(); return; }
      if (email && !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){ hint.style.color = 'var(--ed-warn)'; hint.textContent = 'Enter a valid email'; $('#n_email').focus(); return; }
      const body = { name, email, role: $('#n_role').value, status: $('#n_status').value, subscription_tier: $('#n_tier').value.trim() };
      hint.style.color = ''; btn.disabled = true; btn.textContent = 'Creating…';
      try {
        const r = await fetch('/users', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
        const data = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(data.detail || `HTTP ${r.status}`);
        users[data.user_id] = data;
        selected = data.user_id;
        renderList(); renderMain();
        flash('User created');
      } catch (e) {
        btn.disabled = false; btn.textContent = 'Create user';
        hint.style.color = 'var(--ed-warn)'; hint.textContent = String(e.message || e);
      }
    }

    /* ----------------------------- data + wiring ----------------------------- */
    async function loadUsers(){
      const r = await fetch('/users');
      if (!r.ok){ $('#list').innerHTML = `<li class="ed-empty">Failed to load (${r.status})</li>`; return; }
      const list = await r.json();
      users = {};
      for (const u of list) users[u.user_id] = u;
      // Land on the first real user so the page is populated, not a splash.
      if (selected == null) { const first = sortedUsers()[0]; selected = first ? first.user_id : 0; }
      renderList();
      renderMain();
    }

    $('#searchToggle').addEventListener('click', () => {
      const c = $('#controls'); c.hidden = !c.hidden;
      $('#searchToggle').classList.toggle('active', !c.hidden);
      if (!c.hidden) $('#search').focus();
    });
    $('#addToggle').addEventListener('click', () => { selected = '__new__'; renderList(); renderMain(); nav.afterSelect(); });
    $('#search').addEventListener('input', (e) => { term = e.target.value; renderList(); });
    $('#sort').addEventListener('change', (e) => { sortKey = e.target.value; renderList(); });

    loadUsers();
  </script>
</body>
</html>
