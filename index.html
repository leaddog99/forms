<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Recipe Management</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        #debugConsole {
            background: #f0f0f0;
            border: 1px solid #ccc;
            height: 200px;
            overflow-y: scroll;
            margin-top: 20px;
            padding: 10px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <h1>Recipe Management Debug Console</h1>

    <form id="recipeForm">
        <label>Recipe Name:
            <input type="text" id="name" required>
        </label>
        <br><br>
        <label>Description:
            <textarea id="description" rows="4" required></textarea>
        </label>
        <br>
        <button type="submit">Save Recipe</button>
    </form>

    <h2>Recipes</h2>
    <ul id="recipeList"></ul>

    <h2>Debug Console</h2>
    <div id="debugConsole"></div>

    <script>
        // Debug logging function
        function debugLog(message, type = 'info') {
            const debugConsole = document.getElementById('debugConsole');
            const logEntry = document.createElement('div');
            logEntry.textContent = `[${type.toUpperCase()}] ${message}`;

            // Color code different log types
            switch(type) {
                case 'error':
                    logEntry.style.color = 'red';
                    break;
                case 'warn':
                    logEntry.style.color = 'orange';
                    break;
                case 'success':
                    logEntry.style.color = 'green';
                    break;
            }

            debugConsole.appendChild(logEntry);
            debugConsole.scrollTop = debugConsole.scrollHeight;

            // Also log to console
            console.log(message);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('recipeForm');
            const recipeList = document.getElementById('recipeList');
            const baseUrl = 'http://localhost:8007';

            debugLog('Page loaded successfully');

            // Fetch and display recipes
            async function loadRecipes() {
                debugLog('Attempting to load recipes');
                try {
                    const response = await fetch(`${baseUrl}/recipes`, {
                        method: 'GET',
                        headers: {
                            'Accept': 'application/json'
                        }
                    });

                    debugLog(`Fetch response status: ${response.status}`);

                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }

                    const recipes = await response.json();

                    debugLog(`Received ${recipes.length} recipes`);

                    // Clear existing list
                    recipeList.innerHTML = '';

                    // Populate recipe list
                    recipes.forEach(recipe => {
                        const li = document.createElement('li');
                        li.textContent = `${recipe.data.name} (ID: ${recipe.recipe_id})`;
                        recipeList.appendChild(li);
                    });
                } catch (error) {
                    debugLog(`Failed to load recipes: ${error.message}`, 'error');
                }
            }

            // Initial load of recipes
            loadRecipes();

            // Handle form submission
            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                // Prepare recipe data
                const recipe = {
                    name: document.getElementById('name').value,
                    description: document.getElementById('description').value
                };

                debugLog(`Attempting to save recipe: ${JSON.stringify(recipe)}`);

                try {
                    const response = await fetch(`${baseUrl}/recipes`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Accept': 'application/json'
                        },
                        body: JSON.stringify(recipe)
                    });

                    debugLog(`Save response status: ${response.status}`);

                    if (!response.ok) {
                        const errorText = await response.text();
                        throw new Error(`HTTP error! status: ${response.status}, message: ${errorText}`);
                    }

                    const savedRecipe = await response.json();
                    debugLog(`Recipe saved successfully: ${JSON.stringify(savedRecipe)}`, 'success');

                    // Reset form
                    form.reset();

                    // Reload recipes
                    loadRecipes();
                } catch (error) {
                    debugLog(`Failed to save recipe: ${error.message}`, 'error');
                }
            });
        });
    </script>
</body>
</html>
