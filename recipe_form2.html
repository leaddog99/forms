<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Recipe Manager</title>
  <style>
    body { font-family: sans-serif; display: flex; margin: 0; height: 100vh; }
    .list { width: 30%; border-right: 1px solid #ccc; overflow-y: auto; padding: 1rem; }
    .form { flex: 1; padding: 1rem; overflow-y: auto; }
    .recipe-item { cursor: pointer; margin-bottom: 8px; padding: 4px; border: 1px solid #eee; border-radius: 4px; }
    .recipe-item:hover { background: #f9f9f9; }
    textarea, input, select { width: 100%; margin-bottom: 10px; padding: 8px; font-size: 14px; }
    button { padding: 10px; margin-right: 5px; }
    #feedback { margin-top: 10px; }
  </style>
</head>
<body>
  <div class="list">
    <h3>Recipes</h3>
    <div id="recipeList"></div>
  </div>

  <div class="form">
    <h3>Edit Recipe</h3>
    <form id="recipeForm">
      <input type="hidden" id="recipe_id" />
      <label>Recipe Name</label>
      <input type="text" id="name" />

      <label>Description</label>
      <textarea id="description"></textarea>

      <label>Ingredients (one per line)</label>
      <textarea id="ingredients"></textarea>

      <label>Instructions (one per line)</label>
      <textarea id="instructions"></textarea>

      <label>Template</label>
      <select id="template">
        <option value="classic">Classic</option>
        <option value="modern">Modern</option>
        <option value="minimal">Minimal</option>
      </select>

      <h4>Source</h4>
      <input type="text" id="sourceTitle" placeholder="Source Title" />
      <input type="text" id="author" placeholder="Author" />
      <input type="text" id="originalUrl" placeholder="Original URL" />
      <input type="text" id="affiliateUrl" placeholder="Affiliate URL" />

      <div>
        <button type="submit">💾 Save</button>
        <button type="button" id="deleteBtn">🗑 Delete</button>
        <button type="button" id="clearBtn">➕ New</button>
      </div>
    </form>
    <div id="feedback"></div>
  </div>

  <script>
    const API = "http://localhost:8007";
    const listEl = document.getElementById("recipeList");
    const feedback = document.getElementById("feedback");

    async function loadRecipes() {
      listEl.innerHTML = "Loading...";
      const res = await fetch(`${API}/recipes`);
      const data = await res.json();
      listEl.innerHTML = "";
      data.forEach(r => {
        const item = document.createElement("div");
        item.className = "recipe-item";
        item.textContent = r.data.name || "[Untitled]";
        item.onclick = () => loadForm(r);
        listEl.appendChild(item);
      });
    }

    function loadForm(recipe) {
      const r = recipe.data;
      document.getElementById("recipe_id").value = recipe.recipe_id;
      document.getElementById("name").value = r.name || "";
      document.getElementById("description").value = r.description || "";
      document.getElementById("ingredients").value = (r.recipeIngredient || []).join("\n");
      document.getElementById("instructions").value = (r.recipeInstructions || []).map(i => i.text || i).join("\n");
      document.getElementById("template").value = r.template || "classic";
      document.getElementById("sourceTitle").value = r._source?.origin || "";
      document.getElementById("author").value = r.author?.name || "";
      document.getElementById("originalUrl").value = r._source?.originalUrl || "";
      document.getElementById("affiliateUrl").value = r.affiliateUrl || "";
      feedback.textContent = "";
    }

    document.getElementById("recipeForm").onsubmit = async (e) => {
      e.preventDefault();
      const payload = {
        recipe_id: document.getElementById("recipe_id").value || undefined,
        name: document.getElementById("name").value,
        description: document.getElementById("description").value,
        recipeIngredient: document.getElementById("ingredients").value.split("\n").filter(Boolean),
        recipeInstructions: document.getElementById("instructions").value.split("\n").filter(Boolean).map((text, i) => ({
          "@type": "HowToStep", position: i + 1, text
        })),
        template: document.getElementById("template").value,
        _source: {
          origin: document.getElementById("sourceTitle").value,
          originalUrl: document.getElementById("originalUrl").value,
          type: "cookbook"
        },
        author: { "@type": "Person", name: document.getElementById("author").value },
        affiliateUrl: document.getElementById("affiliateUrl").value
      };

      const res = await fetch(`${API}/recipes`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      const result = await res.json();
      if (res.ok) {
        feedback.textContent = `✅ Saved recipe with ID ${result.recipe_id}`;
        loadRecipes();
      } else {
        feedback.textContent = `❌ Error: ${result.detail}`;
      }
    };

    document.getElementById("deleteBtn").onclick = async () => {
      const id = document.getElementById("recipe_id").value;
      if (!id) return alert("Nothing to delete.");
      const confirmed = confirm("Are you sure?");
      if (!confirmed) return;

      const res = await fetch(`${API}/recipes/${id}`, { method: "DELETE" });
      if (res.ok) {
        feedback.textContent = "🗑 Recipe deleted.";
        document.getElementById("recipeForm").reset();
        loadRecipes();
      } else {
        const result = await res.json();
        feedback.textContent = `❌ Error: ${result.detail}`;
      }
    };

    document.getElementById("clearBtn").onclick = () => {
      document.getElementById("recipeForm").reset();
      document.getElementById("recipe_id").value = "";
      feedback.textContent = "🆕 Ready to create new recipe.";
    };

    loadRecipes();
  </script>
</body>
</html>
